<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>QT_ensin Base Wave Logo Engine</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css?v=base-wave-001">
</head>
<body>
  <main id="canvas-container">
    <div id="logo-header">QT_ensin // BASE_WAVE_ENGINE v0.1</div>
    <div id="status-readout">space: pause / r: reseed / s: png</div>
  </main>

  <aside id="ui-panel">
    <section class="neu-panel">
      <div class="section-title">BASE PRESET</div>
      <select id="chordSelect">
        <option value="0">BASE — offset large wave</option>
        <option value="1">LEAN — stronger side bias</option>
        <option value="2">TALL — higher wave</option>
        <option value="3">DENSE — compact heavy body</option>
      </select>
    </section>

    <section class="neu-panel">
      <div class="section-title">WAVE STRUCTURE</div>
      <div class="control-group">
        <div class="slider-container">
          <div class="slider-header">
            <span>BIAS <small>side position</small></span>
            <span class="val-display" id="valSweep">0.24</span>
          </div>
          <input type="range" id="ctrlSweep" min="-0.35" max="0.35" step="0.01" value="0.24">
        </div>

        <div class="slider-container">
          <div class="slider-header">
            <span>EDGE <small>crest sharpness</small></span>
            <span class="val-display" id="valEdge">1.20</span>
          </div>
          <input type="range" id="ctrlEdge" min="0.55" max="2.30" step="0.01" value="1.20">
        </div>

        <div class="slider-container">
          <div class="slider-header">
            <span>BODY <small>band weight</small></span>
            <span class="val-display" id="valBloom">36</span>
          </div>
          <input type="range" id="ctrlBloom" min="10" max="72" step="1" value="36">
        </div>

        <div class="slider-container">
          <div class="slider-header">
            <span>WAVE <small>amplitude</small></span>
            <span class="val-display" id="valTension">128</span>
          </div>
          <input type="range" id="ctrlTension" min="60" max="190" step="1" value="128">
        </div>
      </div>
    </section>

    <section class="neu-inset">
      <div class="section-title">SURFACE</div>
      <div class="slider-container">
        <div class="slider-header">
          <span>RIPPLE <small>micro motion</small></span>
          <span class="val-display" id="valRipple">0.0</span>
        </div>
        <input type="range" id="ctrlRipple" min="0" max="18" step="0.1" value="0">
      </div>
    </section>

    <section class="readout-card">
      <div class="section-title">CURRENT RULE</div>
      <p>正方形内に収まる大きな片寄せ波。3本は接触させず、同じ文法を持つ独立した帯として生成する。</p>
    </section>
  </aside>

  <script src="sketch.js?v=base-wave-001"></script>
</body>
</html>
