<body>
  <main id="stage"><div id="logo-header">QuanTrios</div><div id="canvas-container"></div></main>

    <div id="morphPage" class="ui-page active"><div class="matrix-panel neu-panel"><div class="xy-pad neu-inset"><div class="xy-label top-left">EDGE</div><div class="xy-label bottom-right">SWEEP</div><div class="xy-grid"></div><input type="range" id="ctrlSweep" min="-1.5" max="1.5" step="0.1" value="0" aria-label="Sweep"><input type="range" id="ctrlEdge" min="0.4" max="2.5" step="0.1" value="1.45" aria-label="Edge"><div id="xyKnob" class="xy-knob"></div><span class="xy-readout left" id="valSweep">0.0</span><span class="xy-readout top" id="valEdge">1.4</span></div><div class="side-controls"><div class="small-control neu-panel"><div class="slider-header"><span>BLOOM</span><span class="val-display" id="valBloom">40</span></div><input type="range" id="ctrlBloom" min="0" max="100" step="1" value="40"></div><div class="small-control neu-panel"><div class="slider-header"><span>TENSION</span><span class="val-display" id="valTension">38</span></div><input type="range" id="ctrlTension" min="0" max="100" step="1" value="38"></div></div></div></div>
    <div id="harmonyPage" class="ui-page"><div class="preset-panel neu-panel"><select id="chordSelect" class="hidden-select" aria-label="Chord type"><option value="0">MAJ</option><option value="1">MIN</option><option value="2">AUG</option><option value="3">DIM</option><option value="4">SUS4</option><option value="5">SUS2</option></select><div class="preset-grid chord-grid" aria-hidden="true"><button class="preset-button active" data-preset="0">MAJ</button><button class="preset-button" data-preset="1">MIN</button><button class="preset-button" data-preset="2">AUG</button><button class="preset-button" data-preset="3">DIM</button><button class="preset-button" data-preset="4">SUS4</button><button class="preset-button" data-preset="5">SUS2</button></div><div class="note-row neu-inset"><div class="note-block"><span class="note-label">ROOT</span><span class="display-pill" data-note-display>A</span><button type="button" class="pill-button step-button" data-note-action="down">−</button><button type="button" class="pill-button step-button" data-note-action="up">＋</button></div><div class="note-block"><span class="note-label">OCT</span><span class="display-pill" data-oct-display>4</span><button type="button" class="pill-button step-button" data-oct-action="down">−</button><button type="button" class="pill-button step-button" data-oct-action="up">＋</button></div></div><div class="range-card neu-inset"><strong id="presetTitle">A Major Triad</strong><span id="rangeText">A4 · C#5 · E5 / 0 · 4 · 7</span></div></div></div>

  <script src="sketch.js?v=qt-motion-param-v84"></script>
  <script>
  (function(){
    var clamp=function(v,a,b){return Math.max(a,Math.min(b,v))};
    var fmt=function(v){var r=Math.round(v);return Math.abs(v-r)<.055?String(r):v.toFixed(1)};
    var originalDefaultState=window.defaultState;
    window.defaultState=function(chord){var s=originalDefaultState(chord);if(typeof st==='undefined'||!st)s.volume=.16;return s};
    function alive(){return typeof st!=='undefined'&&st}
    function ep(t){if(!alive()||!st.motion)return{sweep:st.sweep,edge:st.edge,bloom:st.bloom,tension:st.tension};var c=CHORDS[st.chord],a=Math.sin(t*(1.05+c.tone*.45)),b=Math.sin(t*(1.52+c.dense*.55)+1.7),c3=Math.sin(t*(.82+CHORDS[st.chord].curl*.22)+2.4),c4=Math.sin(t*(1.95+CHORDS[st.chord].wide*.18)+.4),d=.055+st.tension*.115;return{sweep:clamp(st.sweep+a*d+b*.026,0,1),edge:clamp(st.edge+b*d*.78+c4*.018,0,1),bloom:clamp(st.bloom+c3*d*.86+a*.018,0,1),tension:clamp(st.tension+c4*d*.64+b*.024,0,1)}}
    window.currentIntervals=function(t){t=t||0;var c=CHORDS[st.chord],p=ep(t),s=(p.sweep-.5)*2,e=(p.edge-.5)*2,base=c.intervals,m=base[1],spread=clamp(1+s*.34+e*.10,.56,1.65),raw=[0,1,2].map(function(i){return m+(base[i]-m)*spread+(i-1)*s*.85+(i-1)*e*.35});return raw.map(function(v){return v-raw[0]})};
    window.currentNotes=function(t){var r=(st.oct+1)*12+st.root;return currentIntervals(t||0).map(function(iv){return r+iv})};
    window.midiName=function(m){var r=Math.round(m),n=NOTE_NAMES[((r%12)+12)%12],o=Math.floor(r/12)-1,c=Math.round((m-r)*100);return Math.abs(c)<3?n+o:n+o+(c>0?'+':'')+c};
    window.buildRangeText=function(t){var ns=currentNotes(t||0),iv=currentIntervals(t||0);return ns.map(midiName).join(' · ')+' / '+iv.map(fmt).join(' · ')};
    function text(t){if(rangeText)rangeText.textContent=buildRangeText(t||0);if(presetTitle)presetTitle.textContent=NOTE_NAMES[st.root]+' '+CHORDS[st.chord].name}
    function showParams(p,t){var sv=map(p.sweep,0,1,-1.5,1.5),ev=map(p.edge,0,1,.4,2.5),bv=map(p.bloom,0,1,0,100),tv=map(p.tension,0,1,0,100);ctrlSweep.value(sv);ctrlEdge.value(ev);ctrlBloom.value(bv);ctrlTension.value(tv);if(valDisplays.sweep)valDisplays.sweep.html(sv.toFixed(1));if(valDisplays.edge)valDisplays.edge.html(ev.toFixed(1));if(valDisplays.bloom)valDisplays.bloom.html(String(int(bv)));if(valDisplays.tension)valDisplays.tension.html(String(int(tv)));if(valVol)valVol.textContent=int(st.volume*100)+'%';updateXYKnob(sv,ev);text(t||0)}
    var osr=window.syncReadouts;window.syncReadouts=function(){if(osr)osr();text(0)};
    window.triadProfile=function(i,t){t=t||window.__qtTime||0;var c=CHORDS[st.chord],ints=currentIntervals(t),base=c.intervals,iv=ints[i],mn=Math.min.apply(null,ints),mx=Math.max.apply(null,ints),span=Math.max(1,mx-mn),n=(iv-mn)/span,bs=Math.max(1,base[2]-base[0]),bn=(base[i]-base[0])/bs;return{iv:iv,ratio:Math.pow(2,iv/12),notePos:n,peakCenter:lerp(-.50,.50,n)+(n-bn)*.18,gapPrev:i===0?ints[1]-ints[0]:ints[i]-ints[i-1],gapNext:i===2?ints[2]-ints[1]:ints[i+1]-ints[i],avgGap:0,pitchOffset:iv-base[i],tone:c.tone,wide:c.wide,density:c.dense,curl:c.curl}};
    window.motionSignal=function(index,time,tri,nx){if(!st.motion)return{x:0,y:0,speed:0,intensity:0,pulse:0,phase:0};var p=ep(time),ds=(p.sweep-st.sweep)*2,de=(p.edge-st.edge)*2,db=p.bloom-st.bloom,dt=p.tension-st.tension,inten=clamp((Math.abs(ds)+Math.abs(de)+Math.abs(db)+Math.abs(dt))*1.8,0,1),pulse=Math.sin(time*(1.4+index*.2)+index);return{x:0,y:0,speed:inten,intensity:inten,pulse:pulse,phase:time,paramSweep:p.sweep,paramEdge:p.edge,paramBloom:p.bloom,paramTension:p.tension,deltaSweep:ds,deltaEdge:de,deltaBloom:db,deltaTension:dt}};
    window.baseAudioPlan=function(){var c=CHORDS[st.chord],t=st.motion?millis()*.001:0,p=ep(t),sx=(p.sweep-.5)*2,eb=(p.edge-.5)*2,en=Math.abs(sx)*.5+Math.abs(eb)*.36+p.tension*.54;return{sx:sx,edgeBip:eb,energy:en,cutoff:clamp(170*Math.pow(2,p.edge*5.35)+p.bloom*1700+p.tension*1650,120,13500),q:clamp(.38+p.edge*7.2+p.tension*4.8+c.dense*2.6,.35,16),wet:clamp(.01+Math.pow(p.bloom,1.32)*.56+Math.abs(sx)*.075,.01,.76),dry:1,delayTime:clamp(.018+p.bloom*.32+Math.abs(sx)*.11,.012,.54),feedback:clamp(.025+p.bloom*.45+p.tension*.13,.015,.68),ep:p}};
    window.voiceAudioPlan=function(i,notes,pl){var tr=triadProfile(i,st.motion?millis()*.001:0),side=i-1,p=pl.ep,f=midiToHz(notes[i]),det=pl.sx*(16+p.edge*18)*side+pl.edgeBip*side*7+tr.tone*p.tension*side*10,ratio=clamp(1.02+p.edge*.95+p.bloom*.30+p.tension*.18+tr.ratio*.06+side*pl.sx*.03,1.02,2.75),amp=(.034+p.edge*.017+p.bloom*.036+p.tension*.022+tr.density*.010)/Math.sqrt(1.15),pan=clamp(side*.12+pl.sx*.52,-.9,.9);return{tri:tr,side:side,f:f,det:det,ratio:ratio,amp:amp,pan:pan,midi:notes[i]}};
    window.refreshAudio=function(fast){if(!audio||!st.playing)return;if(audio.ctx.state==='suspended')audio.ctx.resume();var t=st.motion?millis()*.001:0,notes=currentNotes(t),pl=baseAudioPlan(),tau=fast?.018:.075;setParam(audio.master.gain,st.volume*(.22+pl.energy*.13),.03);setParam(audio.filter.frequency,pl.cutoff,tau);setParam(audio.filter.Q,pl.q,tau);setParam(audio.dry.gain,pl.dry,tau);setParam(audio.wet.gain,pl.wet,tau*1.25);setParam(audio.delay.delayTime,pl.delayTime,tau*1.4);setParam(audio.feedback.gain,pl.feedback,tau*1.5);audio.voices.forEach(function(v,i){var vp=voiceAudioPlan(i,notes,pl);setParam(v.osc.frequency,vp.f,tau);setParam(v.osc2.frequency,vp.f*vp.ratio,tau*1.1);setParam(v.osc.detune,vp.det,tau);setParam(v.osc2.detune,vp.det*.62+pl.edgeBip*6,tau);setParam(v.gain.gain,vp.amp,.045);if(v.pan)setParam(v.pan.pan,vp.pan,.07)})};
    window.updateAudioMotion=function(t){if(!audio||!st.playing||!st.motion)return;if(millis()-lastAudioMotionUpdate<30)return;lastAudioMotionUpdate=millis();refreshAudio(false);text(t)};
    window.drawGaussianBand=function(index,time){var p=ep(time),tri=triadProfile(index,time),sweep=(p.sweep-.5)*2,edge=p.edge,edgeBip=(edge-.5)*2,tense=p.tension,bloom=p.bloom,ints=currentIntervals(time),span=Math.max(1,ints[2]-ints[0]),ampBase=46+tense*104+edge*32,spacing=76+span*2.2+tri.wide*5-tri.density*5+tense*18,bandAmp=ampBase*(.68+index*.11+tri.ratio*.10+tri.tone*.08),bandVar=clamp(.62+edge*2.10+tri.wide*.10-tri.density*.06,.42,2.72),phaseShift=tri.peakCenter+tri.curl*.04,skew=sweep*(.13+index*.025);fill('#1a1a1a');beginShape();var pts=[],steps=174;for(var j=0;j<=steps;j++){var u=j/steps,x=lerp(-168,168,u),nx=map(u,0,1,-1.48-sweep*.42,3.08+sweep*.48),sxLocal=nx-phaseShift,yBase=(index-1)*spacing+sweep*(index-1)*8,peak=bandAmp*Math.exp(-(sxLocal*sxLocal)/Math.max(.22,bandVar)),dipAmp=ampBase*(.17+tense*.15+tri.tone*.06+edge*.05),leftDip=dipAmp*Math.exp(-Math.pow(sxLocal+1.10-tri.density*.05-sweep*.12,2)/(.46+edge*.20)),rightDip=dipAmp*Math.exp(-Math.pow(sxLocal-1.36-tri.wide*.12+sweep*.12,2)/(.56+edge*.36)),shoulder=edgeBip*14*Math.exp(-Math.pow(sxLocal-.72,2)/.80),curlY=tri.curl*Math.sin(u*Math.PI)*(index-1)*9*(.25+tense+edge*.20),cy=yBase-peak+leftDip+rightDip+shoulder+curlY+skew*x*.08,baseThick=4.2+index*1.0+Math.pow(bloom,1.85)*16+edge*2.4,peakThick=(9+Math.pow(bloom,1.28)*72+edge*12)*(index===1?1.10:.86)*(1+tri.density*.08),th=baseThick+peakThick*Math.exp(-(sxLocal*sxLocal)/(bandVar*(1.12+edge*.52)));pts.push({x:x,cy:cy,th:th});vertex(x,cy-th/2)}for(var k=pts.length-1;k>=0;k--)vertex(pts[k].x,pts[k].cy+pts[k].th/2);endShape(CLOSE)};
    var od=window.draw;window.draw=function(){var t=st&&st.motion?millis()*.001:0;window.__qtTime=t;if(st&&st.motion){showParams(ep(t),t);window.__qtUiMotionActive=true}else if(window.__qtUiMotionActive){window.__qtUiMotionActive=false;syncUIFromState()}od()};
    console.log('[QT_ensin2] UI-range parameter motion v8.4');
  })();
