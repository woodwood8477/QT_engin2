<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>QT_ensin Wave Logo Engine v9.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="style.css?v=qt-motion-morph-v91">
  <style>
    #debug-status { display: none !important; }
    .ui-page { overflow: visible !important; padding: 8px; }
    .ui-page.active { width: 100%; height: 100%; }
    .matrix-panel, .preset-panel, .motion-panel { width: 100%; height: calc(100% - 16px) !important; margin: 0; overflow: hidden; }
    .matrix-panel.neu-panel, .preset-panel.neu-panel, .motion-panel.neu-panel { box-shadow: 7px 7px 14px rgba(163,177,198,.78), -7px -7px 14px rgba(255,255,255,.9); }
    #qt-ui { overflow: visible; }
    #stage { overflow: hidden; }
    .page-tabs { grid-template-columns: repeat(3, 1fr) !important; gap: 14px !important; }
    .side-controls { gap: 18px; }
    .side-controls .small-control { min-height: 96px; padding: 18px 18px; gap: 13px; }
    .transport-strip { grid-template-columns: 52px 1fr 76px 76px !important; }
    .motion-panel { padding: 26px; display: flex; flex-direction: column; justify-content: center; gap: 22px; }
    .motion-title { font-size: 10px; letter-spacing: .16em; color: rgba(44,62,80,.62); font-weight: 600; text-align: center; }
    .motion-knob-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; align-items: center; }
    .knob-control { display: flex; flex-direction: column; align-items: center; gap: 14px; min-width: 0; }
    .knob-dial { --angle: 225deg; --pulse-angle: 225deg; position: relative; width: 132px; height: 132px; border-radius: 50%; background: var(--panel); box-shadow: 9px 9px 17px var(--shadow-dark), -9px -9px 17px var(--shadow-light), inset 2px 2px 4px rgba(255,255,255,.55), inset -2px -2px 4px rgba(163,177,198,.35); cursor: pointer; touch-action: none; transition: box-shadow .18s ease, transform .18s ease; }
    body.motion-running .knob-dial { box-shadow: 9px 9px 17px var(--shadow-dark), -9px -9px 17px var(--shadow-light), inset 2px 2px 4px rgba(255,255,255,.55), inset -2px -2px 4px rgba(163,177,198,.35), 0 0 18px rgba(215,255,104,.18); }
    .knob-dial::before { content:''; position:absolute; inset:16px; border-radius:50%; background:var(--panel); box-shadow: inset 6px 6px 12px rgba(163,177,198,.76), inset -6px -6px 12px rgba(255,255,255,.9); }
    .knob-dot, .knob-activity { position:absolute; left:50%; top:50%; width:9px; height:9px; border-radius:50%; transform: translate(-50%,-50%) rotate(var(--angle)) translateY(-48px); background: var(--accent); box-shadow: 0 0 8px rgba(44,62,80,.25); z-index:3; }
    .knob-activity { width:10px; height:10px; transform: translate(-50%,-50%) rotate(var(--pulse-angle)) translateY(-59px); background:#d7ff68; opacity:0; box-shadow:0 0 10px rgba(215,255,104,.95), 0 0 24px rgba(215,255,104,.55); }
    body.motion-running .knob-activity { opacity: .98; }
    .knob-value { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2; color:var(--accent); font-size:20px; font-weight:600; font-variant-numeric: tabular-nums; }
    body.motion-running .knob-value { text-shadow: 0 0 10px rgba(215,255,104,.26); }
    .knob-scale { position:absolute; bottom:22px; z-index:2; font-size:7px; letter-spacing:.06em; color:rgba(44,62,80,.38); font-weight:600; pointer-events:none; }
    .knob-zero { left:24px; }
    .knob-hundred { right:20px; }
    .knob-name { font-size: 10px; letter-spacing:.13em; color:var(--accent); font-weight:600; }
    .motion-slider { display:none; }
    .metafont-link { position: fixed; left: 24px; bottom: 24px; z-index: 40; width: 112px; height: 38px; border-radius: 14px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--accent); background: var(--panel); font-size: 9px; font-weight: 700; letter-spacing: .13em; box-shadow: 7px 7px 14px var(--shadow-dark), -7px -7px 14px var(--shadow-light); transition: transform .16s ease, box-shadow .16s ease; }
    .metafont-link:hover { transform: translateY(-1px); box-shadow: 9px 9px 17px var(--shadow-dark), -9px -9px 17px var(--shadow-light); }
    .metafont-link:active { transform: translateY(1px); box-shadow: inset 4px 4px 8px rgba(163,177,198,.65), inset -4px -4px 8px rgba(255,255,255,.8); }
    @media (max-width: 960px) {
      .ui-page { padding: 6px; }
      .matrix-panel, .preset-panel, .motion-panel { height: calc(100% - 12px) !important; }
      .matrix-panel { padding: 12px; }
      .page-tabs { gap: 8px !important; }
      .tab-button { font-size: 9px !important; letter-spacing:.08em !important; }
      .transport-strip { grid-template-columns: 42px 1fr 62px 56px !important; gap: 6px !important; }
      .side-controls { gap: 14px; }
      .side-controls .small-control { min-height: 78px; padding: 12px 13px; gap: 8px; }
      .motion-panel { padding: 14px; gap: 12px; justify-content: flex-start; }
      .motion-knob-grid { display:flex; flex-direction:column; gap:12px; }
      .knob-control { width:100%; align-items:stretch; gap:8px; }
      .knob-dial { display:none; }
      .motion-slider { display:block; width:100%; }
      .knob-name { display:flex; justify-content:space-between; align-items:center; }
      .metafont-link { display: none; }
    }
  </style>
</head>
<body>
  <main id="stage">
    <div id="logo-header">QuanTrios</div>
    <div id="canvas-container"></div>
  </main>
  <section id="qt-ui">
    <nav class="page-tabs" aria-label="Control pages">
      <button class="tab-button active" type="button" data-page="morph">MORPH</button>
      <button class="tab-button" type="button" data-page="motion">MOTION</button>
      <button class="tab-button" type="button" data-page="harmony">HARMONY</button>
    </nav>
    <div id="morphPage" class="ui-page active">
      <div class="matrix-panel neu-panel">
        <div class="xy-pad neu-inset">
          <div class="xy-label top-left">EDGE</div><div class="xy-label bottom-right">SWEEP</div><div class="xy-grid"></div>
          <input type="range" id="ctrlSweep" min="-1.5" max="1.5" step="0.1" value="0" aria-label="Sweep">
          <input type="range" id="ctrlEdge" min="0.4" max="2.5" step="0.1" value="1.45" aria-label="Edge">
          <div id="xyKnob" class="xy-knob"></div><span class="xy-readout left" id="valSweep">0.0</span><span class="xy-readout top" id="valEdge">1.4</span>
        </div>
        <div class="side-controls">
          <div class="small-control neu-panel"><div class="slider-header"><span>BLOOM</span><span class="val-display" id="valBloom">40</span></div><input type="range" id="ctrlBloom" min="0" max="100" step="1" value="40"></div>
          <div class="small-control neu-panel"><div class="slider-header"><span>TENSION</span><span class="val-display" id="valTension">38</span></div><input type="range" id="ctrlTension" min="0" max="100" step="1" value="38"></div>
        </div>
      </div>
    </div>
    <div id="motionPage" class="ui-page">
      <div class="motion-panel neu-panel">
        <div class="motion-title">ANIMATION PARAMETERS</div>
        <div class="motion-knob-grid">
          <div class="knob-control" data-motion-param="motionAmount">
            <div class="knob-dial" id="knobMotionAmount"><div class="knob-dot"></div><div class="knob-activity"></div><span class="knob-scale knob-zero">0</span><span class="knob-scale knob-hundred">100</span><div class="knob-value" id="valMotionAmount">75</div></div>
            <div class="knob-name"><span>AMOUNT</span></div><input class="motion-slider" type="range" id="ctrlMotionAmount" min="0" max="100" step="1" value="75">
          </div>
          <div class="knob-control" data-motion-param="motionSpeed">
            <div class="knob-dial" id="knobMotionSpeed"><div class="knob-dot"></div><div class="knob-activity"></div><span class="knob-scale knob-zero">0</span><span class="knob-scale knob-hundred">100</span><div class="knob-value" id="valMotionSpeed">70</div></div>
            <div class="knob-name"><span>SPEED</span></div><input class="motion-slider" type="range" id="ctrlMotionSpeed" min="0" max="100" step="1" value="70">
          </div>
          <div class="knob-control" data-motion-param="motionRandom">
            <div class="knob-dial" id="knobMotionRandom"><div class="knob-dot"></div><div class="knob-activity"></div><span class="knob-scale knob-zero">0</span><span class="knob-scale knob-hundred">100</span><div class="knob-value" id="valMotionRandom">45</div></div>
            <div class="knob-name"><span>RANDOM</span></div><input class="motion-slider" type="range" id="ctrlMotionRandom" min="0" max="100" step="1" value="45">
          </div>
        </div>
      </div>
    </div>
    <div id="harmonyPage" class="ui-page">
      <div class="preset-panel neu-panel">
        <select id="chordSelect" class="hidden-select" aria-label="Chord type"><option value="0">MAJ</option><option value="1">MIN</option><option value="2">AUG</option><option value="3">DIM</option><option value="4">SUS4</option><option value="5">SUS2</option></select>
        <div class="preset-grid chord-grid" aria-hidden="true"><button class="preset-button active" data-preset="0">MAJ</button><button class="preset-button" data-preset="1">MIN</button><button class="preset-button" data-preset="2">AUG</button><button class="preset-button" data-preset="3">DIM</button><button class="preset-button" data-preset="4">SUS4</button><button class="preset-button" data-preset="5">SUS2</button></div>
        <div class="note-row neu-inset"><div class="note-block"><span class="note-label">ROOT</span><span class="display-pill" data-note-display>A</span><button type="button" class="pill-button step-button" data-note-action="down">−</button><button type="button" class="pill-button step-button" data-note-action="up">＋</button></div><div class="note-block"><span class="note-label">OCT</span><span class="display-pill" data-oct-display>4</span><button type="button" class="pill-button step-button" data-oct-action="down">−</button><button type="button" class="pill-button step-button" data-oct-action="up">＋</button></div></div>
        <div class="range-card neu-inset"><strong id="presetTitle">A Major Triad</strong><span id="rangeText">A4 · C#5 · E5 / 0 · 4 · 7</span></div>
      </div>
    </div>
    <div class="transport-strip neu-panel">
      <button id="playButton" class="round-button" type="button" aria-label="Play chord">▶</button>
      <div class="vol-control"><div class="mini-label-row"><span>VOL</span><span id="valVol">16%</span></div><input type="range" id="ctrlVol" min="0" max="100" step="1" value="16"></div>
      <button id="motionButton" class="mode-button" type="button">MOTION</button>
      <button id="resetButton" class="reset-button" type="button">RESET</button>
    </div>
  </section>
  <a class="metafont-link" href="https://woodwood8477.github.io/QT_engin2/experiments/quantrios-metafont/" aria-label="Open QuanTRIOS METAFONT experiment">METAFONT</a>
  <script src="sketch.js?v=qt-motion-morph-v91"></script>
</body>
</html>
