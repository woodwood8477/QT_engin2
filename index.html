<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>QT_ensin Wave Logo Engine v6.9</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css?v=qt-mobile-harmony-v69">
</head>
<body>
  <main id="stage">
    <div id="logo-header">QT_ensin // GAUSSIAN_CHORD_ENGINE v6.9</div>
    <div id="canvas-container"></div>
  </main>

  <section id="qt-ui">
    <nav class="page-tabs" aria-label="Control pages">
      <button class="tab-button active" type="button" data-page="morph">MORPH</button>
      <button class="tab-button" type="button" data-page="harmony">HARMONY</button>
    </nav>

    <div id="morphPage" class="ui-page active">
      <div class="matrix-panel neu-panel">
        <div class="xy-pad neu-inset">
          <div class="xy-label top-left">EDGE</div>
          <div class="xy-label bottom-right">Sweep</div>
          <div class="xy-grid"></div>
          <input type="range" id="ctrlSweep" min="-1.5" max="1.5" step="0.1" value="0" aria-label="Sweep">
          <input type="range" id="ctrlEdge" min="0.4" max="2.5" step="0.1" value="1.45" aria-label="Edge">
          <div id="xyKnob" class="xy-knob"></div>
          <span class="xy-readout left" id="valSweep">0.0</span>
          <span class="xy-readout top" id="valEdge">1.4</span>
        </div>

        <div class="side-controls">
          <div class="small-control neu-panel">
            <div class="slider-header">
              <span>BLOOM</span>
              <span class="val-display" id="valBloom">44</span>
            </div>
            <input type="range" id="ctrlBloom" min="10" max="80" step="1" value="44">
          </div>

          <div class="small-control neu-panel">
            <div class="slider-header">
              <span>TENSION</span>
              <span class="val-display" id="valTension">104</span>
            </div>
            <input type="range" id="ctrlTension" min="30" max="150" step="1" value="104">
          </div>

          <div class="small-control neu-panel compact-ripple">
            <div class="slider-header">
              <span>RIPPLE</span>
              <span class="val-display" id="valRipple">0.0</span>
            </div>
            <input type="range" id="ctrlRipple" min="0" max="30" step="0.5" value="0">
          </div>
        </div>
      </div>
    </div>

    <div id="harmonyPage" class="ui-page">
      <div class="preset-panel neu-panel">
        <select id="chordSelect" class="hidden-select" aria-label="Preset">
          <option value="0">MAJ</option>
          <option value="1">MIN</option>
          <option value="2">DIM</option>
          <option value="3">CLS</option>
        </select>

        <div class="preset-grid triad-grid" aria-hidden="true">
          <button class="preset-button active" data-preset="0">MAJ</button>
          <button class="preset-button" data-preset="1">MIN</button>
          <button class="preset-button" data-preset="2">DIM</button>
          <button class="preset-button" data-preset="3">CLS</button>
        </div>

        <div class="note-row neu-inset">
          <div class="note-block">
            <span class="note-label">NOTE</span>
            <span class="display-pill" data-note-display>A</span>
            <button type="button" class="pill-button step-button" data-note-action="down">−</button>
            <button type="button" class="pill-button step-button" data-note-action="up">＋</button>
          </div>
          <div class="note-block">
            <span class="note-label">OCT</span>
            <span class="display-pill" data-oct-display>4</span>
            <button type="button" class="pill-button step-button" data-oct-action="down">−</button>
            <button type="button" class="pill-button step-button" data-oct-action="up">＋</button>
          </div>
        </div>

        <div class="range-card neu-inset">
          <strong id="presetTitle">A Major</strong>
          <span id="rangeText">A4 · C#5 · E5 / 0 · 4 · 7</span>
        </div>
      </div>
    </div>

    <div class="transport-strip neu-panel">
      <button id="playButton" class="round-button" type="button" aria-label="Play chord">▶</button>
      <div class="vol-control">
        <div class="mini-label-row">
          <span>VOL</span>
          <span id="valVol">78%</span>
        </div>
        <input type="range" id="ctrlVol" min="0" max="100" step="1" value="78">
      </div>
      <button id="motionButton" class="mode-button" type="button">STATIC</button>
      <button id="resetButton" class="reset-button" type="button">RESET</button>
    </div>
  </section>

  <script src="sketch.js?v=qt-mobile-harmony-v69"></script>
</body>
</html>
