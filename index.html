<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuanTRIOS Logo Engine</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

  <div id="canvas-container">
    <div id="logo-header">QuanTRIOS // SIGNAL_ENGINE v6.0</div>
    </div>

  <div id="ui-panel">
    
    <div class="neu-panel">
      <div class="section-title">CHORD PRESET</div>
      <select id="chordSelect">
        <option value="0">MAJOR (Stable / Harmonic)</option>
        <option value="1">MINOR (Phase Shift / Skew)</option>
        <option value="2">DIMINISHED (Tense / Sharp)</option>
        <option value="3">CLUSTER (Condensed / Interference)</option>
      </select>
    </div>

    <div class="neu-panel">
      <div class="section-title">WAVEFORM PARAMETERS</div>
      
      <div class="control-group">
        <div class="slider-container">
          <div class="slider-header">
            <span>SWEEP (Phase Offset)</span>
            <span class="val-display" id="valSweep">0.0</span>
          </div>
          <input type="range" id="ctrlSweep" min="-1.5" max="1.5" step="0.1" value="0">
        </div>

        <div class="slider-container">
          <div class="slider-header">
            <span>EDGE (Variance/Sharpness)</span>
            <span class="val-display" id="valEdge">1.2</span>
          </div>
          <input type="range" id="ctrlEdge" min="0.4" max="2.5" step="0.1" value="1.2">
        </div>

        <div class="slider-container">
          <div class="slider-header">
            <span>BLOOM (Thickness)</span>
            <span class="val-display" id="valBloom">45</span>
          </div>
          <input type="range" id="ctrlBloom" min="10" max="80" step="1" value="45">
        </div>

        <div class="slider-container">
          <div class="slider-header">
            <span>TENSION (Amplitude & Noise)</span>
            <span class="val-display" id="valTension">85</span>
          </div>
          <input type="range" id="ctrlTension" min="30" max="150" step="1" value="85">
        </div>
      </div>
    </div>

    <div class="neu-inset">
      <div class="section-title">MODULATION</div>
      <div class="slider-container">
        <div class="slider-header">
          <span>RIPPLE (HF Noise)</span>
          <span class="val-display" id="valRipple">0.0</span>
        </div>
        <input type="range" id="ctrlRipple" min="0" max="30" step="0.5" value="0">
      </div>
    </div>

  </div>

  <script src="sketch.js"></script>

</body>
</html>
