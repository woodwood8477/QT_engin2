<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>QT_ensin Wave Logo Engine v8.6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="style.css?v=qt-integrated-v86">
  <style>
    #debug-status { display: none !important; }
    .ui-page { overflow: visible !important; padding: 8px; }
    .ui-page.active { width: 100%; height: 100%; }
    .matrix-panel, .preset-panel { width: 100%; height: calc(100% - 16px) !important; margin: 0; overflow: hidden; }
    .matrix-panel.neu-panel, .preset-panel.neu-panel { box-shadow: 7px 7px 14px rgba(163,177,198,.78), -7px -7px 14px rgba(255,255,255,.9); }
    #qt-ui { overflow: visible; }
    #stage { overflow: hidden; }
    .side-controls { gap: 12px; }
    .side-controls .small-control { min-height: 76px; padding: 12px 14px; gap: 9px; }
    .motion-control { min-height: 66px !important; }
    @media (max-width: 960px) {
      .ui-page { padding: 6px; }
      .matrix-panel, .preset-panel { height: calc(100% - 12px) !important; }
      .matrix-panel { padding: 12px; }
      .side-controls { gap: 8px; }
      .side-controls .small-control { min-height: 58px; padding: 9px 10px; gap: 6px; }
    }
  </style>
</head>
<body>
  <main id="stage">
    <div id="logo-header">QuanTrios</div>
    <div id="canvas-container"></div>
  </main>

  <section id="qt-ui">
    <nav class="page-tabs" aria-label="Control pages">
      <button class="tab-button active" type="button" data-page="morph">MORPH</button>
      <button class="tab-button" type="button" data-page="harmony">HARMONY</button>
    </nav>

    <div id="morphPage" class="ui-page active">
      <div class="matrix-panel neu-panel">
        <div class="xy-pad neu-inset">
          <div class="xy-label top-left">EDGE</div>
          <div class="xy-label bottom-right">SWEEP</div>
          <div class="xy-grid"></div>
          <input type="range" id="ctrlSweep" min="-1.5" max="1.5" step="0.1" value="0" aria-label="Sweep">
          <input type="range" id="ctrlEdge" min="0.4" max="2.5" step="0.1" value="1.45" aria-label="Edge">
          <div id="xyKnob" class="xy-knob"></div>
          <span class="xy-readout left" id="valSweep">0.0</span>
          <span class="xy-readout top" id="valEdge">1.4</span>
        </div>

        <div class="side-controls">
          <div class="small-control neu-panel">
            <div class="slider-header"><span>BLOOM</span><span class="val-display" id="valBloom">40</span></div>
            <input type="range" id="ctrlBloom" min="0" max="100" step="1" value="40">
          </div>
          <div class="small-control neu-panel">
            <div class="slider-header"><span>TENSION</span><span class="val-display" id="valTension">38</span></div>
            <input type="range" id="ctrlTension" min="0" max="100" step="1" value="38">
          </div>
          <div class="small-control neu-panel motion-control">
            <div class="slider-header"><span>AMOUNT</span><span class="val-display" id="valMotionAmount">75</span></div>
            <input type="range" id="ctrlMotionAmount" min="0" max="100" step="1" value="75">
          </div>
          <div class="small-control neu-panel motion-control">
            <div class="slider-header"><span>SPEED</span><span class="val-display" id="valMotionSpeed">70</span></div>
            <input type="range" id="ctrlMotionSpeed" min="0" max="100" step="1" value="70">
          </div>
        </div>
      </div>
    </div>

    <div id="harmonyPage" class="ui-page">
      <div class="preset-panel neu-panel">
        <select id="chordSelect" class="hidden-select" aria-label="Chord type">
          <option value="0">MAJ</option><option value="1">MIN</option><option value="2">AUG</option>
          <option value="3">DIM</option><option value="4">SUS4</option><option value="5">SUS2</option>
        </select>
        <div class="preset-grid chord-grid" aria-hidden="true">
          <button class="preset-button active" data-preset="0">MAJ</button><button class="preset-button" data-preset="1">MIN</button><button class="preset-button" data-preset="2">AUG</button>
          <button class="preset-button" data-preset="3">DIM</button><button class="preset-button" data-preset="4">SUS4</button><button class="preset-button" data-preset="5">SUS2</button>
        </div>
        <div class="note-row neu-inset">
          <div class="note-block"><span class="note-label">ROOT</span><span class="display-pill" data-note-display>A</span><button type="button" class="pill-button step-button" data-note-action="down">−</button><button type="button" class="pill-button step-button" data-note-action="up">＋</button></div>
          <div class="note-block"><span class="note-label">OCT</span><span class="display-pill" data-oct-display>4</span><button type="button" class="pill-button step-button" data-oct-action="down">−</button><button type="button" class="pill-button step-button" data-oct-action="up">＋</button></div>
        </div>
        <div class="range-card neu-inset"><strong id="presetTitle">A Major Triad</strong><span id="rangeText">A4 · C#5 · E5 / 0 · 4 · 7</span></div>
      </div>
    </div>

    <div class="transport-strip neu-panel">
      <button id="playButton" class="round-button" type="button" aria-label="Play chord">▶</button>
      <div class="vol-control"><div class="mini-label-row"><span>VOL</span><span id="valVol">16%</span></div><input type="range" id="ctrlVol" min="0" max="100" step="1" value="16"></div>
      <button id="motionButton" class="mode-button" type="button">STATIC</button>
      <button id="resetButton" class="reset-button" type="button">RESET</button>
    </div>
  </section>

  <script src="sketch.js?v=qt-integrated-v86"></script>
</body>
</html>
