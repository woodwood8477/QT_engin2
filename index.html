<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>QT_ensin Wave Logo Engine v8.2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" type="text/css" href="style.css?v=qt-peak-param-v82">
  <style>
    #debug-status{display:none!important}.ui-page{overflow:visible!important;padding:8px}.ui-page.active{width:100%;height:100%}.matrix-panel,.preset-panel{width:100%;height:calc(100% - 16px)!important;margin:0;overflow:hidden}.matrix-panel.neu-panel,.preset-panel.neu-panel{box-shadow:7px 7px 14px rgba(163,177,198,.78),-7px -7px 14px rgba(255,255,255,.9)}#qt-ui{overflow:visible}#stage{overflow:hidden}@media(max-width:960px){.ui-page{padding:6px}.matrix-panel,.preset-panel{height:calc(100% - 12px)!important}.matrix-panel{padding:12px}}
  </style>
</head>
<body>
  <main id="stage">
    <div id="logo-header">QuanTrios</div>
    <div id="canvas-container"></div>
  </main>
  <section id="qt-ui">
    <nav class="page-tabs" aria-label="Control pages"><button class="tab-button active" type="button" data-page="morph">MORPH</button><button class="tab-button" type="button" data-page="harmony">HARMONY</button></nav>
    <div id="morphPage" class="ui-page active"><div class="matrix-panel neu-panel"><div class="xy-pad neu-inset"><div class="xy-label top-left">EDGE</div><div class="xy-label bottom-right">SWEEP</div><div class="xy-grid"></div><input type="range" id="ctrlSweep" min="-1.5" max="1.5" step="0.1" value="0" aria-label="Sweep"><input type="range" id="ctrlEdge" min="0.4" max="2.5" step="0.1" value="1.45" aria-label="Edge"><div id="xyKnob" class="xy-knob"></div><span class="xy-readout left" id="valSweep">0.0</span><span class="xy-readout top" id="valEdge">1.4</span></div><div class="side-controls"><div class="small-control neu-panel"><div class="slider-header"><span>BLOOM</span><span class="val-display" id="valBloom">40</span></div><input type="range" id="ctrlBloom" min="0" max="100" step="1" value="40"></div><div class="small-control neu-panel"><div class="slider-header"><span>TENSION</span><span class="val-display" id="valTension">38</span></div><input type="range" id="ctrlTension" min="0" max="100" step="1" value="38"></div></div></div></div>
    <div id="harmonyPage" class="ui-page"><div class="preset-panel neu-panel"><select id="chordSelect" class="hidden-select" aria-label="Chord type"><option value="0">MAJ</option><option value="1">MIN</option><option value="2">AUG</option><option value="3">DIM</option><option value="4">SUS4</option><option value="5">SUS2</option></select><div class="preset-grid chord-grid" aria-hidden="true"><button class="preset-button active" data-preset="0">MAJ</button><button class="preset-button" data-preset="1">MIN</button><button class="preset-button" data-preset="2">AUG</button><button class="preset-button" data-preset="3">DIM</button><button class="preset-button" data-preset="4">SUS4</button><button class="preset-button" data-preset="5">SUS2</button></div><div class="note-row neu-inset"><div class="note-block"><span class="note-label">ROOT</span><span class="display-pill" data-note-display>A</span><button type="button" class="pill-button step-button" data-note-action="down">−</button><button type="button" class="pill-button step-button" data-note-action="up">＋</button></div><div class="note-block"><span class="note-label">OCT</span><span class="display-pill" data-oct-display>4</span><button type="button" class="pill-button step-button" data-oct-action="down">−</button><button type="button" class="pill-button step-button" data-oct-action="up">＋</button></div></div><div class="range-card neu-inset"><strong id="presetTitle">A Major Triad</strong><span id="rangeText">A4 · C#5 · E5 / 0 · 4 · 7</span></div></div></div>
    <div class="transport-strip neu-panel"><button id="playButton" class="round-button" type="button" aria-label="Play chord">▶</button><div class="vol-control"><div class="mini-label-row"><span>VOL</span><span id="valVol">78%</span></div><input type="range" id="ctrlVol" min="0" max="100" step="1" value="78"></div><button id="motionButton" class="mode-button" type="button">STATIC</button><button id="resetButton" class="reset-button" type="button">RESET</button></div>
  </section>
  <script src="sketch.js?v=qt-peak-param-v82"></script>
  <script>
  (function(){
    var clamp=function(v,a,b){return Math.max(a,Math.min(b,v))};
    var fmt=function(v){var r=Math.round(v);return Math.abs(v-r)<.055?String(r):v.toFixed(1)};
    function ep(t){if(!window.st||!st.motion)return{sweep:st.sweep,edge:st.edge,bloom:st.bloom,tension:st.tension};var c=CHORDS[st.chord],a=Math.sin(t*(1.15+c.tone*.35)),b=Math.sin(t*(1.85+c.dense*.45)+1.7),d=.045+st.tension*.105;return{sweep:clamp(st.sweep+a*d+b*.025,0,1),edge:clamp(st.edge+b*d*.72,0,1),bloom:clamp(st.bloom+Math.sin(t*.72+2.4)*d*.82,0,1),tension:clamp(st.tension+a*d*.48+b*.022,0,1)}}
    window.currentIntervals=function(t){t=t||0;var c=CHORDS[st.chord],p=ep(t),s=(p.sweep-.5)*2,e=(p.edge-.5)*2,base=c.intervals,m=base[1],spread=clamp(1+s*.34+e*.10,.56,1.65),raw=[0,1,2].map(function(i){return m+(base[i]-m)*spread+(i-1)*s*.85+(i-1)*e*.35});return raw.map(function(v){return v-raw[0]})};
    window.currentNotes=function(t){var r=(st.oct+1)*12+st.root;return currentIntervals(t||0).map(function(iv){return r+iv})};
    window.midiName=function(m){var r=Math.round(m),n=NOTE_NAMES[((r%12)+12)%12],o=Math.floor(r/12)-1,c=Math.round((m-r)*100);return Math.abs(c)<3?n+o:n+o+(c>0?'+':'')+c};
    window.buildRangeText=function(t){var ns=currentNotes(t||0),iv=currentIntervals(t||0);return ns.map(midiName).join(' · ')+' / '+iv.map(fmt).join(' · ')};
    function text(t){if(rangeText)rangeText.textContent=buildRangeText(t||0);if(presetTitle)presetTitle.textContent=NOTE_NAMES[st.root]+' '+CHORDS[st.chord].name}
    var osr=window.syncReadouts;window.syncReadouts=function(){if(osr)osr();text(0)};
    window.triadProfile=function(i,t){t=t||window.__qtTime||0;var c=CHORDS[st.chord],ints=currentIntervals(t),base=c.intervals,iv=ints[i],mn=Math.min.apply(null,ints),mx=Math.max.apply(null,ints),span=Math.max(1,mx-mn),n=(iv-mn)/span,bs=Math.max(1,base[2]-base[0]),bn=(base[i]-base[0])/bs;return{iv:iv,ratio:Math.pow(2,iv/12),notePos:n,peakCenter:lerp(-.50,.50,n)+(n-bn)*.18,gapPrev:i===0?ints[1]-ints[0]:ints[i]-ints[i-1],gapNext:i===2?ints[2]-ints[1]:ints[i+1]-ints[i],avgGap:0,pitchOffset:iv-base[i],tone:c.tone,wide:c.wide,density:c.dense,curl:c.curl}};
    window.baseAudioPlan=function(){var c=CHORDS[st.chord],t=st.motion?millis()*.001:0,p=ep(t),sx=(p.sweep-.5)*2,eb=(p.edge-.5)*2,en=Math.abs(sx)*.5+Math.abs(eb)*.36+p.tension*.54;return{sx:sx,edgeBip:eb,energy:en,cutoff:clamp(170*Math.pow(2,p.edge*5.35)+p.bloom*1700+p.tension*1650,120,13500),q:clamp(.38+p.edge*7.2+p.tension*4.8+c.dense*2.6,.35,16),wet:clamp(.01+Math.pow(p.bloom,1.32)*.56+Math.abs(sx)*.075,.01,.76),dry:1,delayTime:clamp(.018+p.bloom*.32+Math.abs(sx)*.11,.012,.54),feedback:clamp(.025+p.bloom*.45+p.tension*.13,.015,.68),ep:p}};
    window.voiceAudioPlan=function(i,notes,pl){var tr=triadProfile(i,st.motion?millis()*.001:0),side=i-1,p=pl.ep,f=midiToHz(notes[i]),det=pl.sx*(18+p.edge*20)*side+pl.edgeBip*side*8+tr.tone*p.tension*side*12,ratio=clamp(1.02+p.edge*1.05+p.bloom*.34+p.tension*.22+tr.ratio*.07+side*pl.sx*.035,1.02,2.95),amp=(.038+p.edge*.02+p.bloom*.042+p.tension*.026+tr.density*.012)/Math.sqrt(1.15),pan=clamp(side*.12+pl.sx*.58,-.9,.9);return{tri:tr,side:side,f:f,det:det,ratio:ratio,amp:amp,pan:pan,midi:notes[i]}};
    window.refreshAudio=function(fast){if(!audio||!st.playing)return;if(audio.ctx.state==='suspended')audio.ctx.resume();var t=st.motion?millis()*.001:0,notes=currentNotes(t),pl=baseAudioPlan(),tau=fast?.018:.075;setParam(audio.master.gain,st.volume*(.34+pl.energy*.20),.03);setParam(audio.filter.frequency,pl.cutoff,tau);setParam(audio.filter.Q,pl.q,tau);setParam(audio.dry.gain,pl.dry,tau);setParam(audio.wet.gain,pl.wet,tau*1.25);setParam(audio.delay.delayTime,pl.delayTime,tau*1.4);setParam(audio.feedback.gain,pl.feedback,tau*1.5);audio.voices.forEach(function(v,i){var vp=voiceAudioPlan(i,notes,pl);setParam(v.osc.frequency,vp.f,tau);setParam(v.osc2.frequency,vp.f*vp.ratio,tau*1.1);setParam(v.osc.detune,vp.det,tau);setParam(v.osc2.detune,vp.det*.62+pl.edgeBip*7,tau);setParam(v.gain.gain,vp.amp,.045);if(v.pan)setParam(v.pan.pan,vp.pan,.07)})};
    window.updateAudioMotion=function(t){if(!audio||!st.playing||!st.motion)return;if(millis()-lastAudioMotionUpdate<30)return;lastAudioMotionUpdate=millis();var notes=currentNotes(t),pl=baseAudioPlan();audio.voices.forEach(function(v,i){var vp=voiceAudioPlan(i,notes,pl),sig=motionSignal(i,t,vp.tri,.35+i*.18),semi=sig.x*.04+sig.pulse*st.tension*.08,f=midiToHz(vp.midi+semi);setParam(v.osc.frequency,f,.04);setParam(v.osc2.frequency,f*vp.ratio,.05);setParam(v.osc.detune,vp.det+sig.y*.13+sig.speed*4.2*vp.side,.04);setParam(v.gain.gain,clamp(vp.amp*(1+sig.intensity*.14+sig.speed*.026),0,.16),.045);if(v.pan)setParam(v.pan.pan,clamp(vp.pan+sig.x*.016+sig.pulse*.028,-.95,.95),.052)});text(t)};
    var od=window.draw;window.draw=function(){window.__qtTime=st&&st.motion?millis()*.001:0;od()};
    console.log('[QT_ensin2] merged peak-pitch parameter motion v8.2');
  })();
  </script>
</body>
