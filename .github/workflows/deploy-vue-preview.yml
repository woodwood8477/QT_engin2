name: Deploy Vue Migration Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current published site
        uses: actions/checkout@v4
        with:
          ref: main
          path: site-main

      - name: Checkout Vue migration branch
        uses: actions/checkout@v4
        with:
          ref: feat/vue-migration
          path: app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Type check
        working-directory: app
        run: npm run type-check

      - name: Stage current published site
        run: |
          mkdir -p public-site
          rsync -a --exclude='.git' --exclude='.github' site-main/ public-site/

      - name: Build Vue preview
        working-directory: app
        env:
          VITE_BASE_PATH: /QT_engin2/vue-migration/
          VITE_OUT_DIR: ../public-site/vue-migration
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
