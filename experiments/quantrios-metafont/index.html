<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>QuanTrios minimum sans</title><style>body{margin:0;background:#eef2f6;color:#111;font-family:-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif}main{max-width:1180px;margin:auto;padding:18px}.k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#667085}h1{font-size:clamp(38px,7vw,82px);line-height:.9;letter-spacing:-.06em;margin:4px 0 16px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin:12px 0}.tools{display:flex;gap:8px;flex-wrap:wrap}.tools button,a{border:1px solid #cbd5e1;border-radius:999px;background:#fff;color:#111;text-decoration:none;padding:9px 13px;font-size:13px}.tools .on{background:#111;color:#fff}.ctrl{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.ctrl label{border:1px solid #e2e8f0;border-radius:12px;padding:10px;font-size:12px;font-weight:700;color:#334155}.ctrl input{width:100%}canvas{width:100%;height:auto;display:block}.note{color:#64748b;font-size:13px;line-height:1.55}@media(max-width:760px){.ctrl{grid-template-columns:repeat(2,1fr)}}</style><main><div class=k>QT project / minimum readable centerline sans</div><h1>QuanTrios<br>METAFONT</h1><nav class=tools><a href=../../>QT engine</a><a href=./QuanTrios.mf>.mf</a><a href=./QuanTrios_test.tex>TeX</a></nav><section class="card tools"><button id=qt>QT</button><button id=rf>Ref</button><button id=ov class=on>Overlay</button><button id=mo>Motion off</button></section><section class=card><canvas id=cv width=1500 height=620></canvas></section><section class="card ctrl"><label>SW <b id=vsw></b><input id=sw type=range min=10 max=34 step=.5 value=18></label><label>XH <b id=vxh></b><input id=xh type=range min=82 max=125 value=100></label><label>WIDTH <b id=vwd></b><input id=wd type=range min=85 max=115 value=100></label><label>SPACE <b id=vsp></b><input id=sp type=range min=2 max=28 value=8></label></section><section class="card note"><b>v min-sans-02</b> / Futura比較用の初期状態をOverlayに変更。x-heightを下げ、字幅とspacingを詰め、単語の統一感を確認しやすくした。</section><script>const ctx=cv.getContext('2d');let mode='overlay',motion=false,t=0;function V(id){return+document.getElementById(id).value}function S(){let a=motion?Math.sin(t*.035):0;return{sw:V('sw')+a*1.4,xh:V('xh')+a*4,wd:V('wd')/100,sp:V('sp'),cap:180}}function setup(s,cap='butt',join='round'){ctx.lineWidth=s.sw;ctx.lineCap=cap;ctx.lineJoin=join;ctx.miterLimit=10;ctx.strokeStyle='#111';ctx.fillStyle='#111'}function line(x1,y1,x2,y2,s,join='round'){setup(s,'butt',join);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}function path(s,f,join='round'){setup(s,'butt',join);ctx.beginPath();f(ctx);ctx.stroke()}function circ(cx,cy,r,s){setup(s,'butt','round');ctx.beginPath();ctx.ellipse(cx,cy,r*s.wd,r,0,0,Math.PI*2);ctx.stroke()}function dot(cx,cy,r){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill()}function guide(y,txt){ctx.save();ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;ctx.setLineDash([6,8]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#64748b';ctx.font='14px monospace';ctx.fillText(txt,16,y-6);ctx.restore()}function ref(text,x,y,s){ctx.save();ctx.fillStyle='rgba(220,38,38,.18)';ctx.font=s.cap+'px Futura,Helvetica,Arial,sans-serif';ctx.fillText(text,x,y);ctx.restore()}function G(ch,x,y,s){let top=y-s.xh,cap=y-s.cap;if(ch==='Q'||ch==='O'){let r=s.cap*.46,cx=x+r+6,cy=y-s.cap/2;circ(cx,cy,r,s);if(ch==='Q')line(cx+r*.22,cy+r*.42,cx+r*.70,cy+r*.88,s);return r*2+18+s.sp}if(ch==='o'){let r=s.xh*.49;circ(x+r+6,top+r,r,s);return r*2+16+s.sp}if(ch==='a'){let r=s.xh*.48,cx=x+r+6;circ(cx,top+r,r,s);line(cx+r,top+2,cx+r,y,s);return r*2+20+s.sp}if(ch==='u'){let l=x+12,r=x+100*s.wd,rad=(r-l)/2;path(s,c=>{c.moveTo(l,top);c.lineTo(l,y-rad);c.quadraticCurveTo(l,y,(l+r)/2,y);c.quadraticCurveTo(r,y,r,y-rad);c.lineTo(r,top)});return 112*s.wd+s.sp}if(ch==='n'){let l=x+12,r=x+100*s.wd;path(s,c=>{c.moveTo(l,y);c.lineTo(l,top);c.lineTo(l+18*s.wd,top);c.quadraticCurveTo(r,top,r,top+s.xh*.36);c.lineTo(r,y)});return 112*s.wd+s.sp}if(ch==='r'){let l=x+12;path(s,c=>{c.moveTo(l,y);c.lineTo(l,top);c.lineTo(l+28*s.wd,top);c.quadraticCurveTo(l+68*s.wd,top,l+76*s.wd,top+s.xh*.17)});return 82*s.wd+s.sp}if(ch==='i'){let m=x+22;line(m,y,m,top,s);dot(m,top-s.sw*1.45,s.sw*.45);return 46*s.wd+s.sp}if(ch==='T'){let m=x+68*s.wd;line(x+4,cap,x+132*s.wd,cap,s,'miter');line(m,cap,m,y,s,'miter');return 140*s.wd+s.sp}if(ch==='A'){let l=x+6,m=x+70*s.wd,r=x+134*s.wd;line(l,y,m,cap,s,'miter');line(r,y,m,cap,s,'miter');line(x+42*s.wd,y-s.cap*.34,x+98*s.wd,y-s.cap*.34,s,'miter');return 142*s.wd+s.sp}if(ch==='V'){let m=x+68*s.wd;line(x+6,cap,m,y,s,'miter');line(x+130*s.wd,cap,m,y,s,'miter');return 140*s.wd+s.sp}if(ch==='W'){let a=x+6,b=x+50*s.wd,c=x+94*s.wd,d=x+138*s.wd,e=x+182*s.wd;line(a,cap,b,y,s,'miter');line(c,cap,b,y,s,'miter');line(c,cap,d,y,s,'miter');line(e,cap,d,y,s,'miter');return 190*s.wd+s.sp}if(ch==='s'){path(s,c=>{let L=x+12,R=x+88*s.wd,M=x+50*s.wd;c.moveTo(R,top+s.xh*.18);c.bezierCurveTo(M,top-8,L,top+8,L+8,top+s.xh*.34);c.bezierCurveTo(L+14,top+s.xh*.54,R,top+s.xh*.45,R-6,top+s.xh*.72);c.bezierCurveTo(R-12,y+4,L+10,y+2,L,y-s.xh*.12)});return 98*s.wd+s.sp}if(ch===' '){return 34*s.wd}return 80*s.wd+s.sp}function draw(text,y,s){let x=60;for(const ch of text)x+=G(ch,x,y,s)}function render(){let s=S();ctx.clearRect(0,0,cv.width,cv.height);let rows=[['QuanTrios',300],['OQoa AVW nur Tis',540]];for(const [txt,y]of rows){guide(y-s.cap,'cap');guide(y-s.xh,'xh');guide(y,'base');if(mode==='ref'||mode==='overlay')ref(txt,60,y,s);if(mode==='qt'||mode==='overlay')draw(txt,y,s)}vsw.textContent=s.sw.toFixed(1);vxh.textContent=Math.round(s.xh);vwd.textContent=Math.round(s.wd*100);vsp.textContent=Math.round(s.sp)}['sw','xh','wd','sp'].forEach(id=>document.getElementById(id).oninput=render);qt.onclick=()=>{mode='qt';qt.classList.add('on');rf.classList.remove('on');ov.classList.remove('on');render()};rf.onclick=()=>{mode='ref';rf.classList.add('on');qt.classList.remove('on');ov.classList.remove('on');render()};ov.onclick=()=>{mode='overlay';ov.classList.add('on');qt.classList.remove('on');rf.classList.remove('on');render()};mo.onclick=()=>{motion=!motion;mo.textContent=motion?'Motion on':'Motion off'};function loop(){if(motion){t++;render()}requestAnimationFrame(loop)}render();loop();</script>
