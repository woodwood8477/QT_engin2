<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QuanTrios Font System</title><style>body{margin:0;background:#eef2f6;color:#111;font-family:-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif}main{max-width:1180px;margin:auto;padding:20px}h1{font-size:clamp(40px,7vw,84px);line-height:.88;letter-spacing:-.06em;margin:0 0 16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.links,.tools{display:flex;gap:8px;flex-wrap:wrap}.btn,.tools button,.tools select{border:1px solid #ccd3dc;background:#fff;border-radius:999px;padding:8px 12px;color:#111;text-decoration:none;font-size:13px}.tools button.on{background:#111;color:#fff}.card{background:#fff;border:1px solid #e4e7ec;border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 1px 3px #0001}canvas{width:100%;height:auto;display:block;background:#fff}.ctrls{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.ctrl{border:1px solid #e4e7ec;border-radius:12px;padding:10px}.ctrl label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#344054}.ctrl input{width:100%}.note{font-size:13px;color:#667085}@media(max-width:760px){.top{display:block}.links{margin-top:12px}.ctrls{grid-template-columns:repeat(2,1fr)}}</style></head><body><main><div class="top"><div><div class="note">QT PROJECT / CODE-DEFINED PARAMETRIC FONT SYSTEM</div><h1>Readable<br>Centerline</h1></div><nav class="links"><a class="btn" href="../../">QT engine</a><a class="btn" href="./QuanTrios.mf">.mf</a><a class="btn" href="./QuanTrios_test.tex">TeX</a></nav></div><section class="card tools"><button id="overlay" class="on">Overlay</button><button id="qt">QT</button><button id="ref">Ref</button><button id="motion">Motion off</button><select id="preset"><option value="geo">Q O a / A V W</option><option value="core">H O n o i / noononno</option><option value="qt">QuanTrios</option><option value="all">All</option></select></section><section class="card"><canvas id="cv" width="1600" height="760"></canvas></section><section class="card ctrls"><div class="ctrl"><label>SW <span id="vsw"></span></label><input id="sw" type="range" min="8" max="34" step="0.5" value="17"></div><div class="ctrl"><label>WIDTH <span id="vwd"></span></label><input id="wd" type="range" min="80" max="130" value="100"></div><div class="ctrl"><label>XH <span id="vxh"></span></label><input id="xh" type="range" min="70" max="118" value="84"></div><div class="ctrl"><label>ROUND <span id="vrd"></span></label><input id="rd" type="range" min="82" max="118" value="100"></div><div class="ctrl"><label>ARCH <span id="varc"></span></label><input id="arc" type="range" min="50" max="120" value="84"></div><div class="ctrl"><label>SPACE <span id="vsp"></span></label><input id="sp" type="range" min="-8" max="38" value="10"></div></section><section class="card note">Circle family: Q/O/o/a. Sharp family: A/V/W. Arch family: n/u/r. Static visual quality first, then safe motion and QT integration.</section></main><script>const c=cv,ctx=c.getContext('2d');let mode='overlay',run=false,t=0;const ids=['sw','wd','xh','rd','arc','sp'];function val(id){return +document.getElementById(id).value}function state(){let s={sw:val('sw'),wd:val('wd')/100,xh:val('xh'),rd:val('rd')/100,arc:val('arc')/100,sp:val('sp'),cap:160};if(run){s.sw+=Math.sin(t*.04)*2;s.wd+=Math.sin(t*.03)*.04;s.rd+=Math.sin(t*.035)*.04;s.arc+=Math.sin(t*.025)*.09;s.sp+=Math.sin(t*.045)*2}return s}function setupStroke(s,sharp=false){ctx.lineWidth=s.sw;ctx.lineCap=sharp?'butt':'round';ctx.lineJoin=sharp?'miter':'round';ctx.strokeStyle='#111';ctx.fillStyle='#111'}function guide(y,label){ctx.strokeStyle='#98a2b3';ctx.lineWidth=1;ctx.setLineDash([6,8]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#667085';ctx.font='16px monospace';ctx.fillText(label,18,y-8)}function oval(x,y,rx,ry,s){setupStroke(s);ctx.beginPath();ctx.ellipse(x,y,rx*s.wd*s.rd,ry*s.rd,0,0,Math.PI*2);ctx.stroke()}function dot(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}function line(x1,y1,x2,y2,s,sharp=false){setupStroke(s,sharp);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}function path(points,s,sharp=false){setupStroke(s,sharp);ctx.beginPath();ctx.moveTo(points[0][0],points[0][1]);for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);ctx.stroke()}function glyph(ch,x,base,s){let top=base-s.xh,cap=base-s.cap,W=90*s.wd,X=a=>x+a*s.wd;if(ch==='Q'){oval(X(68),base-s.cap/2,50,s.cap/2,s);line(X(84),base-s.cap*.25,X(118),base-s.cap*.02,s,true);W=145*s.wd}else if(ch==='O'){oval(X(68),base-s.cap/2,50,s.cap/2,s);W=140*s.wd}else if(ch==='o'){oval(X(52),top+s.xh/2,39,s.xh/2,s);W=108*s.wd}else if(ch==='a'){oval(X(48),top+s.xh/2,35,s.xh/2,s);line(X(84),top+4,X(84),base,s);W=112*s.wd}else if(ch==='A'){path([[X(6),base],[X(62),cap],[X(118),base]],s,true);line(X(36),base-s.cap*.28,X(88),base-s.cap*.28,s,true);W=124*s.wd}else if(ch==='V'){path([[X(4),cap],[X(62),base],[X(120),cap]],s,true);W=126*s.wd}else if(ch==='W'){path([[X(4),cap],[X(48),base],[X(92),cap],[X(136),base],[X(180),cap]],s,true);W=186*s.wd}else if(ch==='H'){line(X(16),base,X(16),cap,s);line(X(112),base,X(112),cap,s);line(X(16),base-s.cap*.52,X(112),base-s.cap*.52,s);W=136*s.wd}else if(ch==='n'){setupStroke(s);ctx.beginPath();ctx.moveTo(X(14),base);ctx.lineTo(X(14),top);ctx.bezierCurveTo(X(36),top-12*s.arc,X(92),top-5*s.arc,X(94),top+s.xh*.36);ctx.lineTo(X(94),base);ctx.stroke();W=116*s.wd}else if(ch==='u'){setupStroke(s);ctx.beginPath();ctx.moveTo(X(14),top);ctx.lineTo(X(14),base-s.xh*.25);ctx.bezierCurveTo(X(18),base+8*s.arc,X(90),base+8*s.arc,X(94),base-s.xh*.25);ctx.lineTo(X(94),top);ctx.stroke();W=116*s.wd}else if(ch==='i'){line(X(20),base,X(20),top,s);dot(X(20),top-30,s.sw*.5);W=46*s.wd}else if(ch==='T'){line(X(2),cap,X(120),cap,s,true);line(X(61),cap,X(61),base,s);W=124*s.wd}else if(ch==='r'){setupStroke(s);ctx.beginPath();ctx.moveTo(X(14),base);ctx.lineTo(X(14),top);ctx.bezierCurveTo(X(28),top-12*s.arc,X(62),top-4*s.arc,X(78),top+s.xh*.18);ctx.stroke();W=84*s.wd}else if(ch==='s'){setupStroke(s);ctx.beginPath();ctx.moveTo(X(76),top+s.xh*.18);ctx.bezierCurveTo(X(48),top-10,X(12),top+8,X(16),top+s.xh*.34);ctx.bezierCurveTo(X(20),top+s.xh*.55,X(76),top+s.xh*.42,X(76),top+s.xh*.70);ctx.bezierCurveTo(X(76),base+3,X(22),base+5,X(10),top+s.xh*.84);ctx.stroke();W=92*s.wd}else if(ch===' '){W=46*s.wd}return W+s.sp}function drawText(text,base,s){let x=50;for(const ch of text)x+=glyph(ch,x,base,s);return x}function render(){let s=state();ctx.clearRect(0,0,c.width,c.height);let p=preset.value;let rows=p==='geo'?[['Q O a',230],['A V W',560]]:p==='core'?[['H O n o i',190],['noononno',390],['HHOOHHO',610]]:p==='qt'?[['QuanTrios',290],['Q u a n T r i o s',530]]:[['Q O a / A V W',170],['noononno',380],['QuanTrios',610]];for(const [text,base] of rows){guide(base,'base');guide(base-s.xh,'xh');guide(base-s.cap,'cap');if(mode!=='qt'){ctx.fillStyle='rgba(217,45,32,.16)';ctx.font=s.cap*1.08+'px Futura, Helvetica, Arial';ctx.fillText(text,50,base)}if(mode!=='ref')drawText(text,base,s)}vsw.textContent=s.sw.toFixed(1);vwd.textContent=Math.round(s.wd*100);vxh.textContent=Math.round(s.xh);vrd.textContent=Math.round(s.rd*100);varc.textContent=Math.round(s.arc*100);vsp.textContent=Math.round(s.sp)}ids.forEach(id=>document.getElementById(id).oninput=render);preset.onchange=render;[overlay,qt,ref].forEach(b=>b.onclick=()=>{mode=b.id;[overlay,qt,ref].forEach(x=>x.classList.remove('on'));b.classList.add('on');render()});motion.onclick=()=>{run=!run;motion.textContent=run?'Motion on':'Motion off'};function tick(){if(run){t++;render()}requestAnimationFrame(tick)}render();tick();</script></body></html>
