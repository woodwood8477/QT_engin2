<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>QT Futura Centerline</title><style>body{margin:0;background:#eef2f6;color:#111;font-family:-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif}main{max-width:1180px;margin:auto;padding:18px}h1{font-size:clamp(38px,7vw,82px);line-height:.88;letter-spacing:-.06em;margin:0 0 14px}.k{font-size:11px;letter-spacing:.16em;color:#667085;text-transform:uppercase}.card{background:#fff;border:1px solid #e4e7ec;border-radius:18px;padding:14px;margin:12px 0}.tools{display:flex;gap:8px;flex-wrap:wrap}.tools button,.tools select,a{border:1px solid #d0d5dd;background:#fff;border-radius:999px;padding:8px 12px;color:#111;text-decoration:none;font-size:13px}.on{background:#111!important;color:#fff!important}canvas{width:100%;height:auto;display:block}.ctrl{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}.ctrl label{border:1px solid #e4e7ec;border-radius:12px;padding:10px;font-size:11px;font-weight:700;color:#344054}.ctrl input{width:100%}.note{color:#667085;font-size:13px;line-height:1.55}@media(max-width:760px){.ctrl{grid-template-columns:repeat(2,1fr)}}</style><main><div class=k>QT project / Futura grammar centerline engine</div><h1>Futura<br>Centerline</h1><nav class=tools><a href=../../>QT engine</a><a href=./QuanTrios.mf>.mf</a><a href=./QuanTrios_test.tex>TeX</a></nav><section class="card tools"><button id=qt class=on>QT</button><button id=ov>Overlay</button><button id=rf>Ref</button><button id=mo>Motion off</button><select id=p><option value=word selected>QuanTrios</option><option value=circle>Circle family</option><option value=peak>Peak family</option><option value=arch>Arch family</option><option value=stem>Stem/S family</option><option value=proof>All proof rows</option></select></section><section class=card><canvas id=cv width=1500 height=700></canvas></section><section class="card ctrl"><label>SW <b id=vsw></b><input id=sw type=range min=10 max=42 step=.5 value=18></label><label>WIDTH <b id=vwd></b><input id=wd type=range min=82 max=118 value=100></label><label>XH <b id=vxh></b><input id=xh type=range min=58 max=88 value=72></label><label>CAP <b id=vcp></b><input id=cp type=range min=145 max=180 value=160></label><label>ARCH <b id=varc></b><input id=arc type=range min=70 max=110 value=94></label><label>ANGLE <b id=vang></b><input id=ang type=range min=42 max=62 value=53></label><label>SPACE <b id=vsp></b><input id=sp type=range min=-10 max=40 value=12></label><label>TAIL <b id=vtl></b><input id=tl type=range min=40 max=115 value=72></label></section><section class="card note"><b>v repair-07</b> / 壊れた全行表示をやめ、初期表示を QuanTrios 単独チェックに戻した。AVW は三角形塗り禁止、stroke 中心線のみ。S/T も同じ proof 系に含める。</section><script>const c=cv,x=c.getContext('2d');let mode='qt',run=0,t=0,ids=['sw','wd','xh','cp','arc','ang','sp','tl'];function V(i){return+document.getElementById(i).value}function S(){let s={sw:V('sw'),wd:V('wd')/100,xh:V('xh'),cap:V('cp'),ar:V('arc')/100,ang:V('ang')*Math.PI/180,sp:V('sp'),tl:V('tl')};if(run){let a=Math.sin(t*.03),b=Math.sin(t*.021+1.2);s.sw+=a*1.4;s.wd+=b*.014;s.xh+=a*2;s.ar+=b*.025;s.sp+=a*1.5;s.tl+=b*5}return s}function st(s,cap='butt',join='round'){x.lineWidth=s.sw;x.lineCap=cap;x.lineJoin=join;x.miterLimit=16;x.strokeStyle=x.fillStyle='#111'}function gl(y,l){x.save();x.strokeStyle='#98a2b3';x.lineWidth=1;x.setLineDash([6,8]);x.beginPath();x.moveTo(0,y);x.lineTo(c.width,y);x.stroke();x.setLineDash([]);x.fillStyle='#667085';x.font='15px monospace';x.fillText(l,18,y-7);x.restore()}function guides(b,s){gl(b-s.cap,'cap');gl(b-s.xh,'xh');gl(b,'base')}function ln(a,b,c,d,s,j='miter'){st(s,'butt',j);x.beginPath();x.moveTo(a,b);x.lineTo(c,d);x.stroke()}function pa(s,f,j='round'){st(s,'butt',j);x.beginPath();f(x);x.stroke()}function cir(cx,cy,r,s){st(s,'butt','round');x.beginPath();x.ellipse(cx,cy,r*s.wd,r,0,0,Math.PI*2);x.stroke()}function dot(cx,cy,r){x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill()}function ref(txt,a,b,s){x.save();x.fillStyle='rgba(239,45,45,.16)';x.font=s.cap*1.08+'px Futura,Helvetica,Arial';x.fillText(txt,a,b);x.restore()}function aw(s){return Math.max(s.xh*1.08,76)*s.wd}function diag(x1,y1,x2,y2,s){ln(x1,y1,x2,y2,s,'miter')}function G(ch,x0,b,s){let top=b-s.xh,cap=b-s.cap,W=90*s.wd,X=a=>x0+a*s.wd,w=aw(s),r=w/2,cr=s.cap/2;if(ch=='O'){cir(X(82),b-cr,cr,s);W=170*s.wd}else if(ch=='Q'){cir(X(82),b-cr,cr,s);diag(X(101),b-s.cap*.24,X(101+s.tl*.52),b+s.cap*.07,s);W=178*s.wd}else if(ch=='o'){cir(X(50),top+s.xh/2,s.xh/2,s);W=104*s.wd}else if(ch=='a'){cir(X(48),top+s.xh/2,s.xh/2,s);ln(X(48+s.xh/2),top+1,X(48+s.xh/2),b,s);W=108*s.wd}else if(ch=='A'){let m=X(72),h=s.cap/Math.tan(s.ang),over=s.cap*.025;diag(m-h,b,m,cap-over,s);diag(m+h,b,m,cap-over,s);ln(m-h*.48,b-s.cap*.30,m+h*.48,b-s.cap*.30,s);W=h*2+44}else if(ch=='V'){let m=X(72),h=s.cap/Math.tan(s.ang),over=s.cap*.055;diag(m-h,cap,m,b+over,s);diag(m+h,cap,m,b+over,s);W=h*2+44}else if(ch=='W'){let h=s.cap/Math.tan(s.ang)*.72,a=X(10),bb=a+h,cc=bb+h,d=cc+h,e=d+h,over=s.cap*.045;diag(a,cap,bb,b+over,s);diag(cc,cap,bb,b+over,s);diag(cc,cap,d,b+over,s);diag(e,cap,d,b+over,s);W=e-a+34}else if(ch=='n'){let l=X(18),rr=l+w;pa(s,cx=>{cx.moveTo(l,b);cx.lineTo(l,top+r);cx.arc(l+r,top+r,r,Math.PI,0,false);cx.lineTo(rr,b)});W=w+48}else if(ch=='u'){let l=X(18),rr=l+w;pa(s,cx=>{cx.moveTo(l,top);cx.lineTo(l,b-r);cx.arc(l+r,b-r,r,Math.PI,0,true);cx.lineTo(rr,top)});W=w+48}else if(ch=='r'){let l=X(18),rr=s.xh*.48*s.ar;pa(s,cx=>{cx.moveTo(l,b);cx.lineTo(l,top);cx.lineTo(l+rr*.66,top);cx.arc(l+rr*.66,top+rr,rr,-Math.PI/2,-.15,false)});W=86*s.wd}else if(ch=='T'){let mid=X(62),bar=s.cap*.62*s.wd;ln(mid-bar/2,cap,mid+bar/2,cap,s,'miter');ln(mid,cap,mid,b,s,'miter');W=bar+28}else if(ch=='i'){ln(X(20),b,X(20),top,s);dot(X(20),top-30,s.sw*.48);W=48*s.wd}else if(ch=='s'){let R=s.xh*.33*s.ar,cx1=X(50),cy1=top+s.xh*.30,cx2=X(43),cy2=top+s.xh*.72;pa(s,cx=>{cx.moveTo(cx1+R*.68,cy1-R*.60);cx.arc(cx1,cy1,R,-.20*Math.PI,1.08*Math.PI,false);cx.arc(cx2,cy2,R,-.72*Math.PI,.58*Math.PI,true)},'round');W=96*s.wd}else if(ch==' '){W=42*s.wd}return W+s.sp}function draw(txt,b,s){let p=60;for(const ch of txt)p+=G(ch,p,b,s)}function row(txt,b,s){guides(b,s);if(mode!='qt')ref(txt,60,b,s);if(mode!='ref')draw(txt,b,s)}function render(){let s=S();x.clearRect(0,0,c.width,c.height);let rows=p.value=='circle'?[['O Q o a',360]]:p.value=='peak'?[['A V W',360]]:p.value=='arch'?[['n u r',290],['ununur',510]]:p.value=='stem'?[['T i s',290],['Trios',510]]:p.value=='proof'?[['O Q o a',130],['A V W',280],['n u r',430],['T i s',580],['QuanTrios',730]]:[['QuanTrios',390],['Q u a n T r i o s',600]];for(const R of rows)row(R[0],R[1],s);vsw.textContent=s.sw.toFixed(1);vwd.textContent=Math.round(s.wd*100);vxh.textContent=Math.round(s.xh);vcp.textContent=Math.round(s.cap);varc.textContent=Math.round(s.ar*100);vang.textContent=Math.round(s.ang*180/Math.PI);vsp.textContent=Math.round(s.sp);vtl.textContent=Math.round(s.tl)}ids.forEach(i=>document.getElementById(i).oninput=render);p.onchange=render;[qt,ov,rf].forEach(b=>b.onclick=()=>{mode=b.id=='ov'?'overlay':b.id;[qt,ov,rf].forEach(z=>z.classList.remove('on'));b.classList.add('on');render()});mo.onclick=()=>{run=!run;mo.textContent=run?'Motion on':'Motion off'};function loop(){if(run){t++;render()}requestAnimationFrame(loop)}render();loop();</script>
