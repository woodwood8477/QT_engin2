<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuanTrios Centerline Proof</title>
<style>
body{margin:0;background:#111;color:#ccc;font:13px/1.5 monospace}
#ui{padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.sl{display:flex;align-items:center;gap:4px}
label{font-size:11px;color:#888}
input[type=range]{width:90px}
button{background:#333;color:#ccc;border:1px solid #555;padding:3px 10px;cursor:pointer;font:12px monospace}
button.on{background:#555;color:#fff}
#warn{color:#f80;font-size:11px;padding:4px 12px;display:none}
canvas{display:block}
</style>
</head>
<body>
<div id="ui">
  <div class="sl"><label>SW</label><input type="range" id="sw" min="6" max="32" value="18"><span id="sw_v">18</span></div>
  <div class="sl"><label>XH</label><input type="range" id="xh" min="80" max="130" value="104"><span id="xh_v">104</span></div>
  <div class="sl"><label>WD%</label><input type="range" id="wd" min="75" max="125" value="100"><span id="wd_v">100</span></div>
  <div class="sl"><label>SP</label><input type="range" id="sp" min="0" max="24" value="8"><span id="sp_v">8</span></div>
  <div class="sl"><label>RD%</label><input type="range" id="rd" min="80" max="115" value="100"><span id="rd_v">100</span></div>
  <button id="bQt" class="on">QT</button>
  <button id="bOv">Overlay</button>
  <button id="bRef">Ref</button>
  <button id="bMo">Motion</button>
</div>
<div id="warn"></div>
<canvas id="c"></canvas>

<script>
// ── constants ────────────────────────────────────────────────────────────────
var XH_CAP = 0.6404; // measured: 988/1544 from Futura.ttc index 0

// Locked Futura ratios — FUTURA_REFERENCE_LOCK.md
var futuraModel = {
  adv: { O:1.1852, Q:1.1852, A:0.9825, V:0.8970, W:1.4067,
         T:0.6399, i:0.3303, o:1.2639, a:1.2608,
         n:1.1530, u:1.1458, r:0.7864, s:0.8532 },
  box: { O:1.0453, Q:1.0674, A:0.9722, V:0.8873, W:1.3970,
         T:0.6101, i:0.1898, o:1.0667, a:1.0164,
         n:0.8614, u:0.8542, r:0.6540, s:0.7136 }
};

var KERN = { Qu:-16, ua:-6, an:-5, nT:4, Tr:-12, ri:-4, io:-3, os:-4,
             AV:-8, VW:-8 };

var REF_FAMILY = '"Futura Medium","Futura"';

// ── state ────────────────────────────────────────────────────────────────────
var cv    = document.getElementById('c');
var ctx   = cv.getContext('2d');
var mode  = 'qt';
var motion = false;
var tick  = 0;
var hasFutura = false;

function checkFutura() {
  if (!document.fonts) return;
  hasFutura = document.fonts.check('16px Futura Medium') ||
              document.fonts.check('16px Futura');
  if (!hasFutura) {
    Promise.all([
      document.fonts.load('16px Futura Medium'),
      document.fonts.load('16px Futura')
    ]).then(function() {
      hasFutura = document.fonts.check('16px Futura Medium') ||
                  document.fonts.check('16px Futura');
      if (!hasFutura) showWarn();
      draw();
    });
    showWarn();
  }
}

function showWarn() {
  var w = document.getElementById('warn');
  w.style.display = 'block';
  w.textContent = 'Futura not detected — reference overlay disabled. ' +
                  'Install Futura Medium and reload to enable.';
}

function slider(id) { return +document.getElementById(id).value; }

function buildState() {
  var w = motion ? Math.sin(tick * 0.032) : 0;
  return {
    sw:    clamp(slider('sw') + w * 1.0, 6, 32),
    xh:    clamp(slider('xh') + w * 2.2, 80, 130),
    wd:    clamp(slider('wd') / 100 + w * 0.006, 0.75, 1.25),
    space: clamp(slider('sp') + w * 0.6, 0, 24),
    round: clamp(slider('rd') / 100 + w * 0.01, 0.80, 1.15),
    over:  4,
    get cap() { return this.xh / XH_CAP; }
  };
}

// ── helpers ──────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function capAdv(ch, s) { return futuraModel.adv[ch] * s.cap * s.wd; }
function lowAdv(ch, s) { return futuraModel.adv[ch] * s.xh  * s.wd; }

function kern(a, b) { return KERN[a + b] || 0; }

// ── drawing primitives ───────────────────────────────────────────────────────
function setup(s) {
  ctx.lineWidth   = s.sw;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.strokeStyle = '#fff';
  ctx.fillStyle   = '#fff';
}

function line(x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function ell(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
}

function dot(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
}

// ── glyph functions ──────────────────────────────────────────────────────────
// Each returns its advance width (already includes s.space).

function glyphO(x, b, s) {
  var la = capAdv('O', s);
  ell(x + la * 0.5000, b - s.cap * 0.5003,
      s.cap * 0.4466 * s.round, s.cap * 0.4477 * s.round);
  return la + s.space;
}

function glyphQ(x, b, s) {
  var la = capAdv('Q', s);
  ell(x + la * 0.5000, b - s.cap * 0.5003,
      s.cap * 0.4466 * s.round, s.cap * 0.4477 * s.round);
  // tail: start at bowl surface, slope to below-baseline
  var tsx = x + la * 0.5000 + s.cap * 0.2317;
  var tsy = b - s.cap * 0.2513;
  var tex = x + la * 0.8308;
  var tey = b + s.cap * 0.0086;
  line(tsx, tsy, tex, tey);
  return la + s.space;
}

function glyphA(x, b, s) {
  var la   = capAdv('A', s);
  var apx  = x + la * 0.5089;
  var apy  = b - s.cap * 1.063;
  var fl   = x + la * 0.0053;
  var fr   = x + la * 0.9947;
  var barY = b - s.cap * 0.3138;
  // fraction along leg from apex to foot at barY
  var t    = 1 - 0.3138 / 1.063;
  var barL = apx - (apx - fl) * t;
  var barR = apx + (fr - apx) * t;
  line(apx, apy, fl, b);
  line(apx, apy, fr, b);
  line(barL, barY, barR, barY);
  return la + s.space;
}

function glyphV(x, b, s) {
  var la  = capAdv('V', s);
  var nx  = x + la * 0.4946;
  var ny  = b + s.cap * 0.0751;
  var top = b - s.cap;
  line(x + la * 0.0058, top, nx, ny);
  line(nx, ny, x + la * 0.9949, top);
  return la + s.space;
}

function glyphW(x, b, s) {
  var la   = capAdv('W', s);
  var top  = b - s.cap;
  var n1x  = x + la * 0.3057;
  var n2x  = x + la * 0.6791;
  var pkx  = x + la * 0.4963;
  var pky  = b - s.cap * 0.6451;
  line(x + la * 0.0037, top, n1x, b);
  line(n1x, b, pkx, pky);
  line(pkx, pky, n2x, b);
  line(n2x, b, x + la * 0.9968, top);
  return la + s.space;
}

function glyphT(x, b, s) {
  var la    = capAdv('T', s);
  var stemX = x + la * 0.5000;
  var barY  = b - s.cap * 0.9291;
  line(x + la * 0.0233, barY, x + la * 0.9767, barY);
  line(stemX, barY, stemX, b);
  return la + s.space;
}

function glyphI_lower(x, b, s) {
  var la    = lowAdv('i', s);
  var stemX = x + la * 0.4990;
  line(stemX, b - s.xh, stemX, b);
  dot(stemX, b - s.xh * 1.3942, s.xh * 0.1483);
  return la + s.space;
}

function glyphN(x, b, s) {
  var la = lowAdv('n', s);
  var lx = x + la * 0.2476;
  var rx = x + la * 0.7551;
  var jy = b - s.xh * 0.5774;
  line(lx, b, lx, b - s.xh);
  ctx.beginPath();
  ctx.moveTo(lx, b - s.xh * 0.6852);
  ctx.bezierCurveTo(
    x + la * 0.4252, b - s.xh * 1.004,
    x + la * 0.6300, b - s.xh * 1.004,
    rx, jy
  );
  ctx.stroke();
  line(rx, jy, rx, b);
  return la + s.space;
}

function glyphU(x, b, s) {
  var la = lowAdv('u', s);
  var lx = x + la * 0.2352;
  var rx = x + la * 0.7652;
  var jy = b - s.xh * 0.3017;
  line(lx, b - s.xh, lx, jy);
  ctx.beginPath();
  ctx.moveTo(lx, jy);
  ctx.bezierCurveTo(
    lx, b + s.xh * 0.004,
    rx, b + s.xh * 0.004,
    rx, jy
  );
  ctx.stroke();
  line(rx, jy, rx, b - s.xh);
  return la + s.space;
}

function glyphR(x, b, s) {
  var la    = lowAdv('r', s);
  var stemX = x + la * 0.3322;
  var endX  = x + la * 0.98;
  var endY  = b - s.xh * 0.9545;
  line(stemX, b, stemX, b - s.xh);
  ctx.beginPath();
  ctx.moveTo(stemX, b - s.xh * 0.80);
  ctx.bezierCurveTo(
    stemX, b - s.xh * 1.05,
    endX,  b - s.xh * 1.05,
    endX,  endY
  );
  ctx.stroke();
  return la + s.space;
}

function glyphA_lower(x, b, s) {
  var la    = lowAdv('a', s);
  var stemX = x + la * 0.7923;
  var cx    = x + la * 0.4886;
  var cy    = b - s.xh * 0.4914;
  var rx    = s.xh * 0.3952 * s.round;
  var ry    = s.xh * 0.4342 * s.round;
  ell(cx, cy, rx, ry);
  line(stemX, b - s.xh + s.sw * 0.2, stemX, b - s.sw * 0.05);
  return la + s.space;
}

function glyphO_lower(x, b, s) {
  var la = lowAdv('o', s);
  ell(x + la * 0.5000, b - s.xh * 0.5000,
      s.xh * 0.4466 * s.round, s.xh * 0.4477 * s.round);
  return la + s.space;
}

function glyphS(x, b, s) {
  var la = lowAdv('s', s);
  var mx = x + la * 0.520;
  var my = b - s.xh * 0.500;
  // upper arc
  ctx.beginPath();
  ctx.moveTo(mx, my);
  ctx.bezierCurveTo(
    x + la * 0.85, b - s.xh * 0.500,
    x + la * 0.85, b - s.xh * 1.000,
    x + la * 0.490, b - s.xh * 1.000
  );
  ctx.bezierCurveTo(
    x + la * 0.10, b - s.xh * 1.000,
    x + la * 0.10, b - s.xh * 0.688,
    mx, my
  );
  ctx.stroke();
  // lower arc
  ctx.beginPath();
  ctx.moveTo(mx, my);
  ctx.bezierCurveTo(
    x + la * 0.15, b - s.xh * 0.500,
    x + la * 0.15, b - s.xh * 0.000,
    x + la * 0.552, b - s.xh * 0.000
  );
  ctx.bezierCurveTo(
    x + la * 0.90, b - s.xh * 0.000,
    x + la * 0.90, b - s.xh * 0.312,
    mx, my
  );
  ctx.stroke();
  return la + s.space;
}

// ── word renderer ─────────────────────────────────────────────────────────────
var GLYPHS = {
  O: glyphO, Q: glyphQ, A: glyphA, V: glyphV, W: glyphW,
  T: glyphT,
  i: glyphI_lower, n: glyphN, u: glyphU, r: glyphR,
  a: glyphA_lower, o: glyphO_lower, s: glyphS
};

function drawWord(word, x, baseline, s) {
  for (var i = 0; i < word.length; i++) {
    var ch = word[i];
    var fn = GLYPHS[ch];
    if (!fn) { x += s.space * 3; continue; }
    x += fn(x, baseline, s);
    if (i < word.length - 1) x += kern(ch, word[i + 1]);
  }
}

// ── reference overlay ────────────────────────────────────────────────────────
function measureRef(text, sample, s, kind) {
  var baseSize     = 100;
  var targetHeight = kind === 'lower' ? s.xh : s.cap;
  ctx.save();
  ctx.font = baseSize + 'px ' + REF_FAMILY;
  var sh = ctx.measureText(sample).actualBoundingBoxAscent ||
           (kind === 'lower' ? 52 : 72);
  var fontSize = baseSize * (targetHeight / sh);
  ctx.font = fontSize + 'px ' + REF_FAMILY;
  var fb = ctx.measureText(text);
  var ascent = fb.actualBoundingBoxAscent ||
               (kind === 'lower' ? fontSize * 0.52 : fontSize * 0.72);
  ctx.restore();
  return { fontSize: fontSize, ascent: ascent, width: fb.width };
}

function drawRef(word, x, baseline, s, kind) {
  if (!hasFutura) return;
  var m = measureRef(word, kind === 'lower' ? 'x' : 'H', s, kind);
  ctx.save();
  ctx.font         = m.fontSize + 'px ' + REF_FAMILY;
  ctx.fillStyle    = 'rgba(255,60,60,0.18)';
  ctx.strokeStyle  = 'rgba(255,60,60,0.55)';
  ctx.lineWidth    = 1;
  ctx.strokeText(word, x, baseline);
  ctx.fillText(word, x, baseline);
  ctx.restore();
}

// ── guides ───────────────────────────────────────────────────────────────────
function drawGuides(baseline, s) {
  ctx.save();
  ctx.lineWidth = 0.5;
  ctx.strokeStyle = 'rgba(80,120,255,0.4)';
  ctx.beginPath(); ctx.moveTo(0, baseline); ctx.lineTo(cv.width, baseline); ctx.stroke();
  ctx.strokeStyle = 'rgba(80,120,255,0.22)';
  ctx.beginPath(); ctx.moveTo(0, baseline - s.xh); ctx.lineTo(cv.width, baseline - s.xh); ctx.stroke();
  ctx.strokeStyle = 'rgba(120,80,255,0.22)';
  ctx.beginPath(); ctx.moveTo(0, baseline - s.cap); ctx.lineTo(cv.width, baseline - s.cap); ctx.stroke();
  ctx.restore();
}

// ── main draw ────────────────────────────────────────────────────────────────
var ROWS = [
  { word:'QuanTrios', kind:'mixed' },
  { word:'OQoa',      kind:'mixed' },
  { word:'AVW',       kind:'cap'   },
  { word:'nur',       kind:'lower' },
  { word:'Tis',       kind:'mixed' }
];

function draw() {
  cv.width  = 1600;
  cv.height = 1355;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, cv.width, cv.height);

  var s      = buildState();
  var marginY = 60;
  var rowH   = (cv.height - marginY * 2) / ROWS.length;

  ROWS.forEach(function(row, idx) {
    var baseline = marginY + rowH * (idx + 0.78);
    drawGuides(baseline, s);

    var refKind = row.kind === 'cap' ? 'cap' : 'lower';

    if (mode === 'qt' || mode === 'overlay') {
      setup(s);
      drawWord(row.word, 40, baseline, s);
    }

    if (mode === 'overlay' || mode === 'ref') {
      drawRef(row.word, 40, baseline, s, refKind);
    }
  });

  ctx.save();
  ctx.font      = '11px monospace';
  ctx.fillStyle = '#555';
  ctx.fillText(
    'sw=' + s.sw.toFixed(1) + '  xh=' + s.xh.toFixed(1) +
    '  cap=' + s.cap.toFixed(1) + '  wd=' + s.wd.toFixed(3) +
    '  sp=' + s.space.toFixed(1) + '  rd=' + s.round.toFixed(3),
    40, cv.height - 12
  );
  if ((mode === 'overlay' || mode === 'ref') && !hasFutura) {
    ctx.fillStyle = '#f80';
    ctx.fillText('Futura not available — reference disabled', 40, cv.height - 28);
  }
  ctx.restore();
}

// ── UI wiring ────────────────────────────────────────────────────────────────
['sw','xh','wd','sp','rd'].forEach(function(id) {
  var el = document.getElementById(id);
  var vl = document.getElementById(id + '_v');
  el.addEventListener('input', function() { vl.textContent = el.value; draw(); });
});

function setMode(m) {
  mode = m;
  document.getElementById('bQt').className  = m === 'qt'      ? 'on' : '';
  document.getElementById('bOv').className  = m === 'overlay' ? 'on' : '';
  document.getElementById('bRef').className = m === 'ref'     ? 'on' : '';
  draw();
}
document.getElementById('bQt').addEventListener('click',  function(){ setMode('qt'); });
document.getElementById('bOv').addEventListener('click',  function(){ setMode('overlay'); });
document.getElementById('bRef').addEventListener('click', function(){ setMode('ref'); });
document.getElementById('bMo').addEventListener('click',  function(){
  motion = !motion;
  document.getElementById('bMo').className = motion ? 'on' : '';
  if (motion) animate();
});

function animate() {
  if (!motion) return;
  tick++;
  draw();
  requestAnimationFrame(animate);
}

checkFutura();
draw();
</script>
</body>
</html>
