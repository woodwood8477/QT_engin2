<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520"><rect width="100%" height="100%" fill="#eef2f6"/><rect x="32" y="32" width="1136" height="456" rx="24" fill="#fff" stroke="#d0d5dd"/><text x="64" y="90" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="28" font-weight="700" fill="#111">Centerline extraction preview temporarily disabled</text><text x="64" y="136" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="18" fill="#344054">The previous SVG connected unrelated skeleton branches and produced a false, unreadable L-shaped result.</text><text x="64" y="174" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="18" fill="#344054">It has been removed from the web preview because it was not a valid confirmation view.</text><text x="64" y="236" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="16" fill="#111">Next web update:</text><text x="64" y="272" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" fill="#344054">1. show Futura TTC exact outline per glyph</text><text x="64" y="302" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" fill="#344054">2. show raw medial-axis points as dots, not connected lines</text><text x="64" y="332" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" fill="#344054">3. rebuild o/O/Q with contour-pair midpoint extraction first</text><text x="64" y="362" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="15" fill="#344054">4. only then connect points into METAFONT-grade curves</text><text x="64" y="430" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="17" fill="#d92d20">Status: not usable yet / not accepted as centerline source</text></svg>