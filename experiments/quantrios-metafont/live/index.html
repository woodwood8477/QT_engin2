次はFutura参照シルエットを基準に、QT中心線を文字ごとに再設計する。</pre></section></main><script>const NS='http://www.w3.org/2000/svg',svg=document.getElementById('svg'),sample=document.getElementById('sample');const S=24,base=235,cap=8;let mode='overlay';function n(id){return Number(document.getElementById(id).value)}function m(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e}function render(){const sw=n('sw'),wd=n('wd')/100,xh=n('xh'),sp=n('sp'),swu=sw/S;let x=34;svg.innerHTML='';const gg=m('g',{}),ref=m('g',{}),qt=m('g',{});svg.append(gg,ref,qt);const X=(o,u)=>o+u*S*wd,Y=u=>base-u*S;function add(g,e){g.appendChild(e);return e}function guide(y,l){add(gg,m('line',{x1:0,y1:Y(y),x2:2400,y2:Y(y),class:'guide'}));const t=add(gg,m('text',{x:8,y:Y(y)-4,class:'guideText'}));t.textContent=l}guide(0,'baseline');guide(xh,'x-height');guide(cap,'cap-height');const rt=add(ref,m('text',{x:34,y:base,class:'futuraRef','font-size':cap*S*1.12,'letter-spacing':'-0.045em'}));rt.textContent=sample.value;function curve(d){add(qt,m('path',{d,class:'curve','stroke-width':sw}))}function bowl(o,cx,cy,rx,ry){add(qt,m('ellipse',{cx:X(o,cx),cy:Y(cy),rx:rx*S*wd,ry:ry*S,class:'curve','stroke-width':sw}))}function dot(o,cx,cy){add(qt,m('circle',{cx:X(o,cx),cy:Y(cy),r:sw*.52,class:'glyph'}))}function v(o,cx,y0,y1){add(qt,m('rect',{x:X(o,cx)-sw/2,y:Y(y1),width:sw,height:(y1-y0)*S,class:'glyph'}))}function h(o,x0,x1,y){add(qt,m('rect',{x:X(o,x0),y:Y(y)-sw/2,width:(x1-x0)*S*wd,height:sw,class:'glyph'}))}function line(o,ax,ay,bx,by){const x1=X(o,ax),y1=Y(ay),x2=X(o,bx),y2=Y(by),dx=x2-x1,dy=y2-y1,d=Math.hypot(dx,dy)||1,nx=-dy/d*sw/2,ny=dx/d*sw/2;add(qt,m('polygon',{points:`${x1+nx},${y1+ny} ${x2+nx},${y2+ny} ${x2-nx},${y2-ny} ${x1-nx},${y1-ny}`,class:'glyph'}))}function C(o,a,b,c,d,e,f,h,i){return`M ${X(o,a)} ${Y(b)} C ${X(o,c)} ${Y(d)} ${X(o,e)} ${Y(f)} ${X(o,h)} ${Y(i)}`}const capRx=(6.94-swu)/2,capRy=(8.31-swu)/2,loRy=(xh+.15-swu)/2;const g={Q(o){bowl(o,4.03,4.00,capRx,capRy);line(o,4.48,1.18,5.36,.12);return 7.82},u(o){v(o,.78+swu/2,1.18,xh);v(o,4.84-swu/2,1.18,xh);curve(C(o,.78+swu/2,1.20,.86,.06,4.72,.06,4.84-swu/2,1.20));return 5.52},a(o){bowl(o,2.72,xh/2,(4.52-swu)/2,loRy);v(o,4.72-swu/2,0,xh);return 5.48},n(o){const lx=.82+swu/2,rx=4.88-swu/2;v(o,lx,0,xh);v(o,rx,0,3.40);curve(C(o,lx,xh-swu/2,1.58,xh+.03,4.52,xh-.02,rx,3.40));return 5.52},T(o){h(o,.08,5.80,cap-swu/2);v(o,2.94,0,cap);return 5.82},r(o){const lx=.82+swu/2;v(o,lx,0,xh);curve(C(o,lx,xh-swu/2,1.25,xh+.02,2.18,xh-.04,2.72,4.38));return 3.12},i(o){v(o,.96,0,xh);dot(o,.96,xh+.90);return 1.72},o(o){bowl(o,2.72,xh/2,(4.62-swu)/2,loRy);return 5.42},s(o){curve(`M ${X(o,3.05)} ${Y(4.48)} C ${X(o,2.45)} ${Y(5.05)} ${X(o,1.02)} ${Y(5.02)} ${X(o,.58)} ${Y(4.08)} C ${X(o,.22)} ${Y(3.30)} ${X(o,.80)} ${Y(2.76)} ${X(o,1.86)} ${Y(2.52)} C ${X(o,3.04)} ${Y(2.24)} ${X(o,3.20)} ${Y(1.42)} ${X(o,2.72)} ${Y(.76)} C ${X(o,2.10)} ${Y(-.06)} ${X(o,.86)} ${Y(.06)} ${X(o,.42)} ${Y(.72)}`);return 3.54},' '(o){return 1.35}};for(const ch of sample.value){if(g[ch])x+=g[ch](x)*S*wd+sp;else{x+=40}}ref.style.display=mode==='qt'?'none':'block';qt.style.display=mode==='ref'?'none':'block';svg.setAttribute('viewBox',`0 0 ${Math.max(760,x+120)} 310`);document.getElementById('swv').textContent=sw.toFixed(1);document.getElementById('wdv').textContent=Math.round(wd*100);document.getElementById('xhv').textContent=xh.toFixed(2);document.getElementById('spv').textContent=sp}['sw','wd','xh','sp'].forEach(id=>document.getElementById(id).addEventListener('input',render));document.getElementById('renderBtn').onclick=render;document.querySelectorAll('.samples button').forEach(b=>b.onclick=()=>{sample.value=b.dataset.text;render()});document.querySelectorAll('.modes button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.modes button').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;render()});render();</script></body></html>
